"s4-1": `Capability is how much an AI system can do: the range of tasks it can take on, and how well it does them. When it is said that AI is advancing or progressing pretty fast, it is the capability of AI models that we are talking about.

From Section 1, remember that bigger models trained on more data have tended to become more capable, often in ways even their builders did not fully predict. Today's leading AI models can write, code, analyze documents, answer hard questions, and serve many use cases. In some narrow areas they already match or beat expert humans. A few concrete measures:

- [METR](https://metr.org/blog/2025-03-19-measuring-ai-ability-to-complete-long-tasks/) measured the length of task (in human work-time) a model can finish on its own. As of early 2025, frontier models could handle software tasks that take a skilled person about 50 minutes, succeeding around half the time. And how long a task it could handle had been doubling roughly every seven months.
- On [GPQA Diamond](https://arxiv.org/abs/2311.12022), a set of PhD-level science questions, human experts with doctorates score about 65% and skilled non-experts about 34%. In 2023, the best AI model scored about 39%, roughly the level of a skilled non-expert. By 2025, top models scored above 85%, beating the experts and nearly maxing out the test.
- On [SWE-bench Verified](https://llm-stats.com/benchmarks/swe-bench-verified), a test of fixing real software bugs drawn from open-source projects, leading models, as of late 2025, resolve roughly 70 to 80% of the tasks.

Think back to the junior hire example. On day one they needed explicit instructions, almost everything spelled out, and had close to no access. But after enough time on the job, they will be able to handle far more work by themselves, and do that work well. That is a growth in capability, and it makes them much more useful than before.

Capability increase works in both directions. The good and the bad, the safe and the risky use cases all grow together. A few reasons rising capability matters for AI safety:

- A more capable system can have bigger effects in the real world. As capability increases, so do the scale, speed, and stakes of a possible mistake.
- Highly capable AI can find unique and novel approaches a person would never think of. That is what makes it useful, and it is also what makes it find paths to a goal in ways we never intended. We look at this in much more detail in the coming sections.
- It gets harder to monitor and keep in check. When a system works at or beyond the level of the people overseeing it, it becomes much harder to tell whether it did the right thing, and did it the right way.

How far and how fast capability will keep increasing is genuinely debated, the same debate we saw in the [Scaling](s1-6) section and one that comes up again in [the last section of this resource](s8). The point to note here is that rising capability is the root of most of the concerns in the AI safety field.

#### What's next in this section

- **[Autonomy](s4-2)**: how independently AI can act, without a human directing each step
- **[AI Tools](s4-4)**: AI that assists and waits for your instructions
- **[Agentic AI](s4-5)**: AI you give a goal, that plans and acts on its own
- **[New Safety Challenges](s4-6)**: the problems that appear only with more capable, autonomous AI`,

"s4-2": `Autonomy is how much an AI system does on its own, without a human directing or approving each step. Autonomy runs along a range: at one end, the AI waits for you at every step and responds to each request, and at the other, it carries out a whole multi-step task on its own before reporting back.

Capability is about how much a system can do, whereas autonomy is about how much we let it do without us in the loop. A system can be highly capable but still only asked to do one small step at a time. Or it can be handed a long chain of actions to carry out on its own. As AI has improved, it has been moving along this range, from answering questions to taking sequences of actions on its own.

When AI is made more autonomous, the safety concerns grow because handing over more autonomy increases both the upside and the risks:

- A mistake or a misread instruction can play out fully before anyone notices instead of being caught early on.
- Errors can pile up quickly. One wrong step feeds into the next, and a small mistake left unchecked early can grow into a big problem by the end.
- AI acts fast, so there is even less time for a human to step in once something starts going wrong.

A main safety concern about autonomy in AI is how we can best use autonomous AI while being able to trust it and check its work. How far and how fast to push AI autonomy is an active choice and an open debate.

Autonomy questions also matter most in capable AI systems. A system that is not very capable acting on its own can only do so much harm. A highly capable system acting on its own is where the bigger concerns come into the picture.

#### What's next in this section

- **[AI Tools](s4-4)**: AI that assists and waits for your instructions
- **[Agentic AI](s4-5)**: AI you give a goal, that plans and acts on its own
- **[New Safety Challenges](s4-6)**: the problems that appear only with more capable, autonomous AI`,

"s4-4": `You give an AI tool an instruction or a question, it responds, and you decide what to do with the response. This is how most people use AI today, staying in the loop throughout.

Think of tools like ChatGPT, Claude, Claude Code, Gemini, GitHub Copilot, Midjourney, Nano Banana, Sora, and Veo. While using any of these tools, the AI produces an output, and you are the one who reads it, judges it, and decides what happens next.

Taking the junior hire example, this is when the manager assigns each task and checks the result before moving to the next step. You might say "draft this email," read the draft, fix it, and then decide whether to send it. The apprentice does the tasks you ask for, and you stay in charge of the end-to-end process.

AI tools are relatively contained from a safety point of view because of the human in the loop. The risks with AI tools are mostly the current ones we saw earlier: the output might be wrong, biased, or misused by the person holding it. Because the AI is not taking actions in the world on its own, there is a limit to how much it can do, and that limit is also why the field is moving fast past it.

The next step is to give AI more agency and let it act on its own, which is what agentic AI does.

#### What's next in this section

- **[Agentic AI](s4-5)**: AI you give a goal, that plans and acts on its own
- **[New Safety Challenges](s4-6)**: the problems that appear only with more capable, autonomous AI`,

"s4-5": `Agentic AI is AI you give a goal, and it plans, executes, iterates, and does all it needs to do to achieve that goal. It plans the steps itself, uses other tools to carry them out, remembers what it has done, and keeps going until the goal is met, without a person approving each action along the way.

Agentic AI combines two things. Agency is being pointed at a goal and working out how to reach it yourself. [Autonomy](s4-2) is acting without a human approving each step. An agent has both: it is handed a goal and left to pursue it on its own.

When a junior hire becomes more capable, you give them more agency, access, and autonomy, and you hand them goals rather than tasks. This is a similar shift to the one from AI tools to agentic AI. With AI tools, you say "draft this email" and check the result. With an AI agent, you say "sort out this customer's complaint," and it reads the account, writes the reply, issues the refund, and updates the record on its own.

#### Why is agentic AI important

An AI that completes whole tasks is worth far more than one that only makes suggestions a person still has to act on. So companies and individuals are racing to build better agents, and there is an obvious economic incentive to keep improving them. Agents are already being [put to work across industries](https://www.bcg.com/publications/2025/how-agentic-ai-is-transforming-enterprise-platforms):

- *Software:* coding agents that take a task and write or fix code across a whole codebase, the most established use today.
- *Customer service:* handling a support request end to end, from reading the account to issuing a refund.
- *IT operations:* triaging and auto-resolving routine support tickets.
- *Supply chain:* spotting shortages and rerouting stock or placing new orders.
- *Insurance:* processing claims from start to finish.
- *Finance and analytics:* building data dashboards and putting together business forecasts.

Here are two experiments by Andon Labs, an AI safety evaluation company, that show how AI agents can be genuinely impressive in clean conditions, while real-world messiness can be hard for them to navigate.

- Andon Labs ran a test called [Vending-Bench](https://andonlabs.com/evals/vending-bench), where different AI models run a simulated vending machine business. Some models turn a real profit over the course of a year.
- Andon Labs also gave an AI control of a [real café in Stockholm](https://andonlabs.com/blog/ai-cafe-stockholm), with the goal of setting up and running the café business end to end. The agent analyzed the lease, figured out a setup plan, posted job openings, screened resumes, and scheduled interviews on its own, adapting its approach as it went. That is impressive, but it also ordered 120 eggs for a kitchen with no stove, and it forgot it was only digital, inviting candidates to in-person interviews before switching to phone interviews instead.

#### What happens when AI gets agency

Context becomes very important once AI has agency. People working in a given setting inherit a lot of context by default, the unwritten common sense that helps them act well in the real world. AI agents do not come with that shared context, so they can be missing information they really need to make good decisions. A few things follow from that.

- There can be a gap between the goal we give an agent and what we actually mean, with all the assumed context still in our heads. With an AI tool, a person can catch a bad answer before acting on it. An agent acts on the goal directly, so if the goal does not capture what we really wanted, it can pursue the wrong thing. This is, roughly, the alignment problem that the next section is about, and it is one of the major AI safety concerns.
- No one is checking each step, so as we saw with autonomy, a mistake or a misread instruction can run its full course before anyone notices.
- It can take paths we never expected. As we saw with capability, a capable system finds approaches a person would not think of, and some of them are not what we had in mind.

To be clear, an agent working toward a goal is not evil, ill-intentioned, or sneaky. AI has no intentions of its own. It is a system working as best it can to meet the goal it was given, in the most effective way it found. The problem lives in the gap between the goal we state and the real goal we meant, along with the limits on how precisely we can state any goal at all, which later sections get into.

Agentic AI is genuinely useful and is being built for good reasons. The worry is that capable, autonomous, agentic AI is exactly the combination that makes aligning and controlling AI hard. How fast and how widely to deploy agents is itself an open debate. The next section talks about new safety challenges that come with this more agentic and advanced AI.

#### What's next in this section

- **[New Safety Challenges](s4-6)**: the problems that appear only with more capable, autonomous AI`,

"s4-6": `The safety challenges researchers worry about come from three things rising together that create much more advanced AI systems and raise associated safety concerns:

- capability: how much a system can do
- autonomy: how much independence we give it, how little we supervise it
- agency: how much it pursues a goal on its own

When all three are high, a capable, autonomous AI agent can pursue a goal that does not match what we really meant, do it very effectively, in ways we did not foresee, with little chance for us to step in along the way.

Think back to the junior hire example, and consider them years later doing a much more senior role. Now they are highly capable, trusted to act without being checked on, and given important goals to meet. A capable, independent employee will pursue those goals, using methods they figure out themselves, some of which might be unexpected or novel, and you will only step in once the work is fully done. This all sounds good. So what is there to worry about?

The very things that make them useful, their skill, their independence, and their initiative, are what can make them a pretty risky bet too. Even if they have the goal slightly wrong, or reach it by means you find unacceptable, you may only see the full impact at a point where you can no longer do much about it, or undo what is already done. That, in short, is the heart of the worry about advanced AI.

This is what the upcoming sections dig into.

- Getting an AI to reliably do what we actually meant, even when our words do not capture it fully, is hard and still unsolved. This is called alignment, and it is what [the next section](s5-1) is about.
- Keeping people able to watch, correct, and stop systems that are more capable than us, and built into more of what we do, gets harder as those systems advance. [Section 6](s6) looks at where that can lead.
- Researchers also worry that capable, goal-directed systems can develop patterns that simple tools never showed, like trying to stay switched on or to gather resources, because those things help reach almost any goal. Section 6 covers this too.

How likely these challenges are, and how soon, is still debated, and we cover that debate in [the last section](s8). The reason to work on these challenges right now is that it is much easier to solve them before highly capable, autonomous systems are everywhere than after.

#### What's next

When you're ready, move on to Section 5: Why Is Making AI Safe So Hard?. It talks about the first and most important of these challenges: getting AI to do what we actually mean.`,

"s3-1": `Bias in an AI system means producing outcomes that favor some groups of people and disadvantage others, when there is no fair reason for the difference. The "favor" matters as much as the "disadvantage" because they are two sides of the same problem. A hiring tool that is biased for one kind of candidate is also rejecting another kind.

Three causes for bias in AI stand out.

- Training data comes from the real world that already contains past human decisions, stereotypes, judgment gaps, and prejudices. A system that learns from such data reflects those human biases and social inequalities.
- The goal the system is given can also create bias. When a system is pushed hard toward a single target like efficiency, fairness can get sacrificed along the way.
- How a system is used can feed bias back in. When a system is retrained on the data it collects from its users, it can absorb the biases in how those users behave, drifting over time toward their habits and prejudices.

Two everyday examples to understand this better:

- *Hiring.* A resume screening tool trained on a company's past hiring data learns what "a strong candidate" looks like, based on who got hired and who did not. If those past decisions skewed heavily in favor of one kind of candidate, the tool can discriminate against applicants simply because they differ from those who succeeded before.
- *Lending.* A credit model may never be shown an applicant's race, but by learning from data like postal code or schooling, it can end up turning down people from certain neighborhoods at higher rates than others.

Reducing AI bias is a core part of responsible AI work. The main tools are better data, regular audits that test a model for uneven error rates, and keeping a human in the loop for high-stakes decisions like jobs, loans, medical care, and more.

To keep the problem in proportion, we must remember that bias is not unique to AI. People make biased decisions too. The unfairness usually traces back to human society and its data. Part of what makes the bias problem hard is that "fair" has no single agreed definition. Researchers have shown that several reasonable definitions cannot all be met at once, and improving on one can actually worsen another. The aim of work on AI bias is to keep the benefits of automated decisions while catching and reducing the unfair patterns.

#### What's next in this section

- **[Deepfakes](s3-2)**: AI-generated images, audio, and video that can deceive
- **[Misinformation](s3-3)**: false content produced and spread at scale
- **[Hallucinations](s3-7)**: when an AI confidently states false things as true
- **[Privacy](s3-4)**: how AI can collect, expose, or infer personal information
- **[Misuse](s3-5)**: deliberately using AI to cause harm
- **[Overreliance](s3-6)**: trusting AI more than we should`,

"s3-2": `A deepfake is a fake image, audio clip, or video made by AI that looks or sounds real. It can show a real person saying or doing something they never said or did.

Deepfakes are made using [generative AI](s1-3), the kind of AI from Section 1 that creates new content. To make one, an AI system studies many photos or recordings of a person, learns what their face or voice is like, and then makes new images or sound that look and sound just like them. Deepfakes are risky because most of us are used to believing what we see and hear with our own eyes and ears.

Take a real case from 2024. A finance worker at a large firm joined a video call with people he thought were his chief financial officer and some colleagues. Every face on the call was a deepfake. Believing it was real, he sent the fraudsters about [25 million dollars](https://www.cnn.com/2024/02/04/asia/deepfake-cfo-scam-hong-kong-intl-hnk).

That scam is one kind of risk deepfakes pose, among many different kinds. The large majority of deepfakes online are sexual images of real people made without their consent. [Almost all of them target women and girls](https://www.unwomen.org/en/articles/faqs/ai-powered-online-abuse-how-ai-is-amplifying-violence-against-women-and-what-can-stop-it).

There are tools that try to spot deepfakes, and a growing push to explicitly label AI-made media so they can be detected easily. Social platforms are starting to label and/or take down fakes. New laws are also targeting the worst uses. For example, the US [TAKE IT DOWN Act](https://www.congress.gov/crs-product/LSB11314) (signed May 2025) makes non-consensual intimate images, including deepfakes, a federal crime and requires platforms to remove them quickly; and the [EU AI Act](https://artificialintelligenceact.eu/article/50/) requires AI-generated content and deepfakes to be labeled (applies August 2026). None of this is a full fix. Detection is a constant chase because as the detectors get better, so do the fakes. The aim of the work here is to keep the honest uses while making the harmful fakes easier to catch and harder to get away with.

#### What's next in this section

- **[Misinformation](s3-3)**: false content produced and spread at scale
- **[Hallucinations](s3-7)**: when an AI confidently states false things as true
- **[Privacy](s3-4)**: how AI can collect, expose, or infer personal information
- **[Misuse](s3-5)**: deliberately using AI to cause harm
- **[Overreliance](s3-6)**: trusting AI more than we should`,

"s3-3": `Misinformation is false or misleading information that spreads either by accident or on purpose. It has always existed but AI can increase its scale and decrease its cost.

Generative AI can write fluent text that sounds like humans and make images in seconds at a low cost. So one person can now create thousands of articles, posts, comments, even videos (deepfakes too), and fake accounts to share them. This lets false or low-quality content (often called AI slop) flood the platforms where people get their news.

NewsGuard, an organization working on information reliability, has counted [more than 3,000 AI-generated "news" websites](https://www.newsguardtech.com/special-reports/ai-tracking-center/) that publish articles with little or no human checking. These websites often look like ordinary local news outlets.

Media literacy efforts try to help people spot misinformation. Content moderation efforts by technology platforms, including labeling and taking down fake content and accounts, help reduce misinformation. Better labeling of AI-generated content, and detection, as we saw in the [Deepfakes](s3-2) section, also help here.

One of the bigger worries right now is also the sheer volume of AI-generated content. Content from reliable sources can drown in the ocean of AI-generated content, and people start trusting everything they see and hear a little less.

#### What's next in this section

- **[Hallucinations](s3-7)**: when an AI confidently states false things as true
- **[Privacy](s3-4)**: how AI can collect, expose, or infer personal information
- **[Misuse](s3-5)**: deliberately using AI to cause harm
- **[Overreliance](s3-6)**: trusting AI more than we should`,

"s3-7": `AI hallucinations are incorrect, misleading, or fabricated information an AI model generates.

The system is not lying or trying to mislead you. As we saw in the [Generative AI](s1-3) section earlier, AI models work by predicting the next most likely words. Whether the response generated is actually true is a separate question. Also, if a model doesn't have the correct context or has contradictory information in its training data, it may predict the next words in its response inaccurately, and even give completely different responses to the same question. AI can invent details, names, sources, and quotes that don't exist but fit the shape of a good answer.

It is easy to see the harms of AI hallucination. Air Canada's customer-service chatbot [made up a refund policy that did not exist](https://www.americanbar.org/groups/business_law/resources/business-law-today/2024-february/bc-tribunal-confirms-companies-remain-liable-information-provided-ai-chatbot/). Lawyers have repeatedly filed court documents with case citations an AI [fabricated](https://www.damiencharlotin.com/hallucinations/).

AI labs are working to reduce hallucinations by making models check real sources to quote information, training them to admit when they are unsure, and adding fact-checking steps. Hallucinations are getting less frequent as models improve. But no system can be fully trusted yet, as even the best ones still slip. This is exactly why how much we rely on and trust AI systems, which the [Overreliance](s3-6) section looks at, matters so much.

#### What's next in this section

- **[Privacy](s3-4)**: how AI can collect, expose, or infer personal information
- **[Misuse](s3-5)**: deliberately using AI to cause harm
- **[Overreliance](s3-6)**: trusting AI more than we should`,

"s3-4": `Privacy harms happen when an AI system collects, exposes, or figures out personal information in ways people did not expect or agree to.

There are a few different ways privacy concerns show up.

- *Training data.* Big models learn from huge amounts of internet data, which can include personal details about real people. A model can sometimes repeat those details back when asked.
- *Users sharing information.* Whatever information, sometimes private or confidential, a user types into an AI tool may be stored and used to improve the AI.
- *Inference.* AI can guess sensitive information about a person, like their health, location, or identity, from clues or patterns it gathers.
- *Surveillance.* AI makes it cheap to watch many people at once, recognizing faces, voices, and behavior, at a scale that was not practical before.

Think about an employee who pastes a confidential client document into an AI tool to get a quick summary. This document may no longer be considered private as per the company's data privacy standards. Or simply think of an AI model trained on scraped web pages that, when prompted a certain way, gives a real person's contact details.

Data protection laws set rules on what can be collected and stored. On the technical side, teams try to strip personal details out of training data, limit how much is collected, and process data on your own device. Many organizations now have rules about what employees may and may not share with AI tools.

Privacy concerns are not new. Ever since the internet and mobile phones, personal data privacy problems have existed. But with AI, the scale and the power to infer, to join the dots between scattered pieces of data, are unprecedented.

#### What's next in this section

- **[Misuse](s3-5)**: deliberately using AI to cause harm
- **[Overreliance](s3-6)**: trusting AI more than we should`,

"s3-5": `Misuse is when people intentionally use AI to cause harm. Things like [deepfakes](s3-2) and [AI-generated misinformation](s3-3) are often the means of AI misuse.

AI lowers the skill, cost, time, and effort needed to conduct harmful acts. A few of the common AI misuses are scams and frauds, cyberattacks, manipulation, harassment and abuse.

AI labs add safety guardrails that make models refuse to act on clearly harmful requests, set usage rules, and also monitor and shut down abusive accounts. Security teams at all kinds of organizations test their own systems to find loopholes before attackers do, to safeguard their products and customers. And most of the AI misuses (fraud, abuse, threats) are already crimes, so existing laws apply.

How much AI raises the ceiling of what harmful actors can do, especially as AI systems become more capable, is a real and open question. It is also where the worries about risks associated with more advanced AI start.

#### What's next in this section

- **[Overreliance](s3-6)**: trusting AI more than we should`,

"s3-6": `Overreliance is leaning on AI more than we should, trusting its answers without checking, or handing over so much of our thinking to it that our own skills and judgment slowly start to fade.

Overreliance can happen because AI is fast, general-purpose, and sounds confident. Plus, it is right often enough that verifying its outputs starts to feel unnecessary.

Two patterns emerge commonly with consistent AI use.

- First is trusting AI over our own judgment, even when we have good reasons to doubt it.
- Second is losing the skill, ability, or the habit of doing the task ourselves, because the AI always does it for us.

If a busy professional accepts an AI-drafted response without reading it fully or critically, a fabricated fact can slip into the work. If students use AI on every assignment, they stop learning to think through problems themselves, making it increasingly harder for them to solve problems on their own. If stakes are high, so are the resulting consequences of overreliance on AI. Think about situations where AI systems make a high-stakes call on a medical, legal, or financial matter without a human in the loop at all.

Good AI systems should be designed to push back against overreliance. It can be done by showing how confident they actually are in their response, by always pointing to their sources, and flagging when a human should check their response. The steady advice across high-stakes fields is to keep a person in the loop and to educate people about what AI systems are good and not good at.

Using AI is fine, the problem is relying on it too much. Humans should understand what AI is and is not, and only place the right level of trust in it. Figuring out that "right level" gets harder though as AI becomes more capable and we hand it more work and bigger decisions.

#### What's next

So far this section has looked at problems that are already here. The next section turns to a different kind of worry. It is less about what today's AI gets wrong and more about what could happen as AI becomes far more capable and starts to act more on its own.

When you're ready, move on to Section 4: Why Do Researchers Worry About More Advanced AI?`,

"s2-1": `> *Quick recap (skip if you've just read Section 1): AI is software that learns from examples instead of following instructions written by a person. Because it learns on its own, even its builders can't always predict or fully explain why it does what it does. We pictured today's AI as an apprentice on day one: a junior employee with real skills and a lot of potential, who still needs instructions and supervision, and has limited access to resources.*

Let's set some context for why there exists a whole field called AI safety in the first place. There are many obvious, and many non-obvious, reasons behind it. This section covers the first, obvious reason: every technology needs safety work. It also covers a few not-so-obvious aspects that come into the picture because AI is a new, unique, and extremely powerful kind of technology.

#### Every powerful technology needs safety work

Think about the technologies we rely on every day. Cars have brakes and seat belts, and we have developed a whole set of traffic rules for them to operate by in the real world too. Electricity in our homes runs through insulation, fuses, and grounded wiring. Medicines go through extensive trials, dosing limits, and come with warning labels.

Brakes, fuses, or dosing limits are not proof that cars, electricity, or medicines are bad or harmful. These are just methods that let us draw the benefits of something powerful while limiting the harm if and when it fails or gets misused. All new and powerful technologies get this kind of attention on safe use, and that attention is a really good thing.

Taking the example of a capable new hire again: someone checks their work regularly, and there are limits to what they can access based on what the manager or the company thinks is required. Those early limits are a sensible way to get value from someone capable while the stakes are still low and trust is being built.

Guardrails and safety mechanisms are an important part of using something powerful well.

#### AI is a different kind of technology, and brings different kinds of risks

Cars, electricity, and medicines are well understood today. We have had decades to learn how they fail and how to make them safer. AI is different in ways that make those old lessons only go so far.

A few things set it apart:

- It shows a kind of intelligence that no earlier technology has exhibited. It does things that used to need human judgment, like writing, planning, or giving advice.
- It is probabilistic in nature, working in likelihoods rather than fixed outputs (a point we covered in [How AI Learns](s1-5)). So even the people who build it can't fully predict what it will do.
- It is general, in the sense that one AI system can do many different jobs, depending on who is using it for what and how. So the list of things that could go wrong is long and hard to map out in advance.
- Its effects can reach people who never choose to use it. A car can only put the people in it or near it at risk. But an AI system can affect your life even if you never use one yourself: it may screen your job application, score your loan application, shape what news you see, or in extreme cases [be used to harm people on a large scale](s6-4).
- Its speed of progress and scale are new too. ChatGPT reached around 100 million users within about two months of launch, the fastest a consumer technology had ever spread at the time. When something this capable reaches that many people that fast, a single flaw doesn't stay in one place.

#### Why AI needs a safety field of its own

Because AI is both powerful and genuinely new, with its own set of known, evolving, and unknown problems, we can't just borrow the safety lessons from older technologies. We have to study what is specific to AI: what can go wrong, how, and what guardrails actually work on the technology itself.

The later sections get specific about the new kinds of risks AI brings, from problems we already see today to ones researchers worry about in more advanced systems. AI safety research is the work of understanding those risks and figuring out solutions to them.

The next three sections talk about three more reasons AI safety is important: making AI reliable, keeping humans in control, and making sure its outcomes are beneficial for humanity.

#### What's next in this section

- **[Reliability](s2-2)**: getting AI to do what it's supposed to do, consistently
- **[Human Control](s2-3)**: keeping people able to oversee, correct, and stop these systems
- **[Beneficial Outcomes](s2-4)**: making sure highly capable AI actually helps people, while limiting the harm`,

"s2-2": `Reliability is one of the first things we ask of any technology. We trust a tool when we can count on it to do its job whenever we need it. With most software, that shows up as doing the exact same thing every time. For example, a spreadsheet totals a column identically on every run.

But as we saw in [How AI Learns](s1-5), AI systems are probabilistic, so the same input can produce slightly different outputs, and small changes in wording can lead to quite different outputs. This variation is not a defect. An AI is flexible by nature: consistent within a range rather than identical down to the word. So reliability here is less about getting the exact same output every time, and more about being able to count on the system to do what we need across the situations we use it in.

Another important factor of reliability is the system doing the thing you actually wanted it to do. Getting an AI to pursue what we meant is its own deep problem, called alignment, and without it reliability does not really hold. We touch on alignment in the next section, [Human Control](s2-3), and dig into it properly in [Alignment](s5-1).

Both layers, behaving dependably and doing what we actually intended, are basic things AI safety works on, and many of the harder problems we get to later build on getting them right.

#### What's next in this section

- **[Human Control](s2-3)**: keeping people able to oversee, correct, and stop these systems
- **[Beneficial Outcomes](s2-4)**: making sure highly capable AI actually helps people, while limiting the harm`,

"s2-3": `Most technologies do exactly what they are built to do. A banking app moves money by following the exact steps a programmer wrote, and a login screen checks your password against the rule it was given. AI is the first technology that learns from examples rather than from instructions we write out. Nobody hand-writes its behavior, so nobody fully specifies it either. That opens a gap between what we want a system to do and what it actually learns to do.

Researchers call this the [alignment problem](s5-1): getting an AI's goals and behavior to match what people actually intend. They already see cases where a system pursues the goal it was given in a way its designers did not want, technically succeeding while missing the point. We look at this closely in later sections. For now the thing to hold onto is that [misalignment](s6-2) is one of the most important and most actively researched problems in AI safety today.

The misalignment concern grows with capability. A more capable, more autonomous system that has misunderstood what we wanted is harder to catch and harder to correct. Some researchers worry that, taken far enough, advanced systems could become difficult for people to oversee, correct, or in extreme cases shut down at all. How likely such cases are, and how soon we will have systems that can exhibit such behavior in the real world, is genuinely debated, and we come back to it later. Either way, designing systems so people keep the ability to oversee, correct, and step in is a serious focus of AI safety.

#### What's next in this section

- **[Beneficial Outcomes](s2-4)**: making sure highly capable AI actually helps people, while limiting the harm`,

"s2-4": `So far this section has focused on what AI safety work aims for: making AI reliable, and keeping it under human control. But there are also huge upsides to AI going right, ones the AI safety field can help make possible.

Because AI can work quickly, at large scale, and across many kinds of problems at once, it could help solve problems that have been hard for a long time. For example, speeding up scientific and medical research, or helping run complex systems like energy grids or supply chains more smoothly. The promise is that this single capable technology could speed up progress on many fronts at the same time.

The same powerful technology that can do a lot of good can also do a lot of harm, because capability tends to work both ways. A model capable of helping design useful medicines is drawing on capabilities not far from ones that could help design dangerous ones too.

So in a way, the goal of AI safety is to make sure that as AI systems grow more capable, the outcomes are actually beneficial for people. AI safety work can help us get the benefits of AI while keeping the serious harms as unlikely and as small as possible.

#### What's next

So far we've looked at why AI safety exists and what it is trying to protect. From here we get concrete about the risks themselves: first the problems AI already creates today, like bias, deepfakes, misinformation, and misuse, then the risks researchers expect from more advanced systems, along with the solutions being worked on and the questions still up for debate. Seeing all of it together is what shows why AI safety matters as much as it does.

When you're ready, move on to Section 3: What Can Go Wrong Today?`,

"s7-1": `> *Quick recap (skip if you've just read Section 6): alignment is getting an AI to reliably do what we actually intend. Sections 5 and 6 were about why that is hard. This section is about the work being done on those hard problems. The first group, technical AI safety, is the part that works on the AI models and systems themselves.*

Alignment research is the broad effort to make AI systems pursue what we actually intend. It covers many different approaches, and it helps to see how they fit together.

One common way to map the field of alignment splits it into three pillars: outer alignment, inner alignment, and alignment foundations. Let's get an overview of these pillars.

#### Outer alignment: did we set the right goal?

Outer alignment is about getting the goal and the incentives right in the first place. Think back to the Section 5 problem: the goal we write down is a stand-in for our real goal, and a system can satisfy the stand-in while missing the real goal. Research here is about closing that gap. The main research directions here are:

- *Scalable oversight.* As the name suggests, we want oversight that scales, that keeps working even as AI grows more capable, but that tends to be a hard technical problem to solve. Human feedback works while people can still tell good answers from bad. Once a system is smarter, more capable than us at the very task we are judging, this mechanism breaks down. For example: trying to grade an expert's work in a field you don't know. Scalable oversight is the search for ways to supervise systems that outsmart us, for example by using AI to help humans check AI's work, or by breaking a hard judgment into smaller pieces we can actually check.
- *Reward modeling.* This is about how a system learns what we value in the first place. We can't write down a rule for everything we care about, so instead we show the system which answers we prefer, and it builds its own internal sense of what "good" looks like, the thing it then tries to score well on. The research here is about making that learned sense richer and more accurate, so it captures nuance, ethics, and the things we never spell out, rather than just what is easy to rate.
- *Robustness.* Stress-testing the model with tricky and adversarial inputs to catch failures before release. More on this in its [own section](s7-3).

#### Inner alignment: did the system actually adopt our goal?

Even with a good goal, there is a second problem. Remember how a trained system can end up pursuing its own internal goal rather than the one we trained for? Researchers call that mesa-optimization, and inner alignment is the work of making that internal goal match the one we intended. Deceptive alignment, from Section 6, is the sharpest version of this: a system that learns to act the way we want whenever it is being watched, and to behave differently when it is not. It looks perfectly aligned, which is exactly what makes it hard to catch.

The main research directions here are:

- *Interpretability.* Looking inside the system to read what it is actually doing, instead of judging only by its behaviour. It is the next section: [Interpretability](s7-2).
- *Corrigibility.* Building systems that welcome being corrected, paused, or switched off, rather than resisting it. This is the direct counter to the shutdown-avoidance we saw under power-seeking in Section 6.

#### Alignment foundations: the theory underneath

A third strand is more mathematical and longer-horizon. Instead of testing today's models, it works on the underlying theory of how a capable agent should reason, and what it would even mean to build one that is safe by design. The most concrete example is eliciting latent knowledge (ELK): getting a system to honestly report everything it knows, so it cannot hide something or mislead us. There is more related work, often called agent foundations and decision theory, that is more abstract still, and we will leave it at the names here.

#### Where this stands

Alignment research is large, fast-moving, and mostly unsolved. What we saw above is one common way to organize it, though not the only one, and all of these research directions are open and unfinished. There is no settled solution to the alignment problem right now. The field is growing fast in the search for one, if a complete solution even exists.

#### What's next in this section

- **[Interpretability](s7-2)**: looking inside a system to understand what it is actually doing
- **[Evaluations](s7-5)**: testing a system for dangerous capabilities and behaviour before release
- **[Robustness](s7-3)**: stress-testing and red-teaming to find failures on purpose
- **[Monitoring](s7-4)**: keeping watch once a system is deployed`,

"s7-2": `Back in [Loss of Control](s6-1) we hit a wall: we can watch what a system does, but we mostly cannot see why. Interpretability is the work aimed at changing that.

Interpretability means looking inside a system to understand what it is actually doing, instead of judging it only by its outputs. A trained model is millions or billions of numbers, with nothing labelling what any of them are for. Interpretability research tries to find structure in that pile: which groups of those numbers stand for which concepts, and which ones drive a particular behaviour.

Interpretability can be:

- *Bottom-up*, also called mechanistic interpretability. Reading the actual internal workings, tracing which parts of the model do what, a bit like reverse-engineering the machine piece by piece.
- *Top-down*. Working from the outside in, running careful experiments to infer what must be going on inside, without reading every part.

If it works, interpretability is one of the most direct answers to the [misalignment and deceptive-alignment problems](s6-2) from Section 6. It would let us catch a system that has quietly learned the wrong goal, or one that behaves well only while it is being watched, by checking what it is actually doing rather than trusting how it looks from its outputs.

We can read small pieces of today's models, and the field is moving quickly, but no one can yet open up a frontier model and fully explain why it did what it did. For now interpretability is a promising technique rather than a finished one.

#### What's next in this section

- **[Evaluations](s7-5)**: testing a system for dangerous capabilities and behaviour before release
- **[Robustness](s7-3)**: stress-testing and red-teaming to find failures on purpose
- **[Monitoring](s7-4)**: keeping watch once a system is deployed`,

"s7-5": `Interpretability looks inside a system. Evaluations test the system from the outside, before it is released, to see what it can do and how it behaves.

An evaluation, commonly called "eval," is a structured test. Two questions matter most in evals:

1. Does the system have dangerous capabilities: could it meaningfully help someone with something like a cyber or a CBRN (Chemical, Biological, Radiological, and Nuclear) attack?
2. Does it behave the way we want when it is pushed to extremes?

Frontier labs, evaluation experts, and external partner organizations run a host of these tests before a model gets released.

We want to find out how a model behaves when deployed before it gets shipped for wider use, not after. Evaluation is the main checkpoint between building a system and releasing it, and it is where some of the [catastrophic-risk worries](s6-4) get checked in practice. Evals are not only a pre-release gate, though: labs also re-run them on updated and fine-tuned versions, and as part of ongoing safety checks, so evaluation keeps going after launch too.

The catch is that an eval only catches what someone thought to check. A model can pass every eval we have and still do something we never tested for. So "we found no problem" is not the same as "there is no problem." Evals raise our confidence in the model, but they do not fully prove that a system is safe.

#### What's next in this section

- **[Robustness](s7-3)**: stress-testing and red-teaming to find failures on purpose
- **[Monitoring](s7-4)**: keeping watch once a system is deployed`,

"s7-3": `Robustness work is testing how sturdy a system is: instead of checking that it works, you try hard to make it fail. It is the practical hunt for the loophole-finding we saw in Section 5.

It helps to understand two ideas here. *Stress testing* is the broad notion: push a system past normal use to find where it breaks. *Adversarial testing*, usually called red-teaming, is the sharpest form of it: rather than just throwing hard inputs at the system, real people act as attackers and deliberately try to defeat it.

Most robustness work is done through red-teaming. Testers feed the system tricky, hostile, or unusual inputs to surface vulnerabilities, loopholes, and edge cases where it behaves badly. This is done on purpose, in the lab, to stop someone getting their hands on such cases out in the real world. The most familiar example of red-teaming is *jailbreaking*: tricking a model into bypassing its own safety guardrails to produce something it is supposed to refuse.

Red-teaming goes well beyond jailbreaking, and covers several kinds of attack:

- *Capability elicitation*: coaxing out hidden or "dark" skills a model may have but does not show by default, like advanced hacking, finding software vulnerabilities, or revealing confidential information.
- *Adversarial simulation*: going after the infrastructure around the model, not just the model itself, for example trying to steal its trained [weights](s1-5) or poison its training data.
- *Agentic testing*: pressure-testing AI agents that take real actions, for risks like being granted too many permissions, having their memory tampered with (memory poisoning), or escalating their own access without authorization.
- *Safety and alignment*: checking how well the model resists producing harmful content, hate speech, biased output, or dangerous medical and chemical information.

There is a limit built into this method, the same way there is one in evals: you can only find the failures you manage to check for or provoke. Real users and bad actors are endlessly creative and they adapt, so getting through a round of red-teaming only means "we did not break it this time," not "it cannot be broken."

#### What's next in this section

- **[Monitoring](s7-4)**: keeping watch once a system is deployed`,

"s7-4": `Evaluations and robustness checks are mostly run in controlled conditions, before and around release. Monitoring is the counterpart out in the real world: keeping watch once a system is live and being used.

Once a model is deployed, people keep an eye on how it is actually behaving in the real world, watching for concerning patterns, misuse, or failures that pre-release testing could not catch. Testing can never cover every situation a system will meet, so monitoring is the ongoing safety net. It is the last line of defence for catching and handling trouble once a system is out in the world.

Monitoring runs into the same wall as the rest of the techniques. A system can behave well exactly when it is being monitored (do you remember the deceptive-alignment problem?), and at the scale these systems are used, no tooling can watch everything. Monitoring helps, but it is not a guarantee.

*That covers the technical AI safety group. The next group, governance, steps back from the systems themselves to the rules and coordination around them: laws, shared standards, and agreements between companies and countries.*

#### What's next in this section

- **[Regulation](s7-7)**: the laws and rules governments use to steer how AI is built and used
- **[Standards](s7-8)**: shared technical and safety norms the field agrees to follow
- **[International Coordination](s7-9)**: agreements and cooperation between countries on AI`,

"s7-6": `> *Quick recap (skip if you've just read the technical group): technical AI safety works on the AI systems themselves: alignment research to make them pursue what we intend, interpretability to see what they are doing inside, and evaluations, robustness testing, and monitoring to check them before and after release. This group steps outside the system, to the rules and incentives around it.*

The technical AI safety group was about fixing AI from the inside. Governance is about everything around AI: the rules, standards, incentives, and agreements that shape which systems get built, which ones get released, and who has access to what.

Here is the core reason it exists. Even if the technical side of safety were easy to get right (it is not, as we saw), the pressure to move fast and stay ahead of competitors can still push risky systems out in the world. Being fast and being safe are two very different problems to solve, and companies have huge commercial incentives to keep shipping quickly. Similarly, every country also has an incentive to build highly capable AI faster than any other country. Governance is what tries to enforce a balance of safety and high capability by changing some incentives from the outside, so that being careful is not a competitive disadvantage.

Governing AI is harder than governing most other technologies, for a few reasons:

- *Borders don't contain AI.* A model trained in one country affects every country, and the trained model itself can be copied and moved. National rules struggle with something that does not remain constrained by borders.
- *The stakes are high and often hard to reverse.* Unlike a faulty product you can recall, a capable model that has been released, or whose weights are out, cannot really be pulled back fully.
- *The people making the rules often don't understand the technology.* AI is a deeply technical field with more open questions than settled answers, so even the experts disagree on many aspects. That leaves policymakers trying to govern something the field itself is still figuring out.
- *The technology outruns the law.* Models change faster than rules can be written, so governance is always at risk of regulating last year's system.

So what is all this governance actually trying to do? A few main objectives:

- *Reduce large-scale and societal harms*, the kind Section 6 was about.
- *Create accountability*, so someone is answerable when an AI system causes harm.
- *Keep development steered by the public interest*, not only by what is profitable or fastest.
- *Avoid choking off the benefits*, since rules that are too blunt can block useful and even safety-improving work.
- *Prevent a dangerous concentration of power*, so that control over the most capable systems does not pool into very few hands (related to the [gradual disempowerment](s6-7) concern, seen from the other direction).

Before we get to the specific tools, here is the idea that connects them: AI safety cannot come from a single rule. It comes from multiple layers that together keep the whole system safe, a bit like air travel, where planemakers follow shared technical standards, a national regulator must certify an aircraft before it flies, and international bodies make sure a plane approved in one country is trusted in another. AI governance has a similar three-layer shape: *standards*, the shared norms the field agrees to follow; *regulation*, the laws a government enforces; and *international coordination*, the agreements between countries.

The shape is similar but the maturity is not. Aviation took decades to build these layers, and AI's versions are early and full of gaps. Aviation also has an easier job: a plane only risks the people who choose to board it, while AI can affect people who never chose to use it.

There are two more places where AI governance comes into play: what a frontier lab developing AI, and what an organization adopting AI, do in practice to keep it safe. These are covered under [Organizational Safety](s7-10).

Worth saying plainly: AI governance, like AI itself, is fast evolving, with open questions, attempts at a beneficial outcome for all, and some decisions made with currently available inputs and understanding. What follows is an overview, a landscape of what is being tried, and not a finished system.

#### What's next in this section

- **[Standards](s7-8)**: the shared norms the field agrees to follow
- **[Regulation](s7-7)**: the laws a government enforces
- **[International Coordination](s7-9)**: agreements and cooperation between countries`,

"s7-8": `Standards are the shared norms a field agrees to follow, even when no one is forcing them.

In any maturing technology, standards are how a field settles on what "good and safe" looks like, so that every company is not working it out alone. Think of car crash-test ratings. There is an agreed way to measure how safe a car is, the same test for everyone, and buyers and regulators trust the result, often well before any law requires a particular score. A good safety standard is that kind of shared, trusted yardstick.

AI is not there yet. There is no single safety standard that every lab and country follows. A US lab, a Chinese lab, and even two labs in the same city are not working to one common rulebook. What exists instead is a mix of separate, still-forming efforts. It helps to see the pieces clearly. Three of them stand out, none yet complete:

- *Governance standards.* General frameworks for managing AI risk responsibly. The best known are the NIST AI Risk Management Framework, from the US government, and ISO/IEC 42001, an international standard a company can be certified against. These check that a company has sound processes in place, the way a security certification does. They are voluntary and uneven: Anthropic became one of the first frontier labs to be certified against ISO/IEC 42001, while most others are not. These say nothing directly about whether a given model is safe, just that the company has sound processes as per the framework.
- *Voluntary safety frameworks.* The major Western frontier labs publish their own safety policies, like Anthropic's Responsible Scaling Policy, OpenAI's Preparedness Framework, and Google DeepMind's Frontier Safety Framework. Each sets thresholds and the tests a model must pass before release. The catch is that each lab writes its own, so these are self-set promises rather than a shared external standard.
- *Shared measurement.* This is where real common ground is forming. Independent evaluators like METR, along with government bodies such as the UK's AI Security Institute and the US Center for AI Standards and Innovation (part of a wider international network), run similar dangerous-capability tests on frontier models: things like whether a model can act on its own, help with a cyberattack, or copy itself. Access usually depends on the labs agreeing to it, but it is the closest thing to a shared yardstick we have, and notably an emerging practice rather than a written rule.

So the honest picture: AI safety standards are young and mostly voluntary. Many countries now have their own frameworks, China's AI Safety Governance Framework and India's AI Governance Guidelines among them, but they do not line up with each other. The labs and independent evaluators driving the voluntary frameworks and shared evaluations are concentrated in the US, UK, and EU, while China is building its own framework on a largely separate track. Across all of them, the field is converging faster on how to measure risk than on agreeing what should be allowed. This is real and growing, but it is not yet the universal, trusted yardstick that crash-test ratings are for cars.

#### What's next in this section

- **[Regulation](s7-7)**: the laws a government enforces
- **[International Coordination](s7-9)**: agreements and cooperation between countries`,

"s7-7": `Standards are mostly voluntary. Regulation is what happens when a government decides some rules must be followed, with real penalties for breaking them.

Regulation means the rules a government writes and enforces about how AI can be built and used. It can require companies to test high-risk systems before release, disclose how a system works, label AI-generated content, or ban certain uses outright, and it backs those rules with penalties.

Different countries are regulating AI in different ways. A few examples of what exists or is taking shape:

- *European Union.* The AI Act sorts AI uses by risk level and sets obligations for each level, phasing in by stages, with the obligations for high-risk systems and transparency taking effect in August 2026.
- *China.* A set of binding rules covers AI services and content, including a requirement that AI-generated material be labelled.
- *United States.* There is no comprehensive federal AI law; individual states such as California and Colorado have passed their own.
- *India.* The approach so far is a set of guidelines rather than binding law.

There are two more levers to think about here. One is *liability*: laws deciding who is responsible, and who pays, when an AI system causes harm. The other is compute: the most capable models need enormous computing power, so the advanced chips behind that power become a point of control, and some governments place rules on their export, tying who can access top chips to who can build the most capable AI.

##### Why regulation matters

It turns "should" into "must." If every company has to clear the same bar, being careful is no longer a competitive disadvantage. This directly counters a central pressure in AI, where the race to stay ahead can push companies to release risky systems.

There are, of course, real tradeoffs to be cognizant of here. Regulation moves slowly while AI progress is moving at tremendous speed. Regulations can also be written too narrowly and miss the real dangers, or written too broadly and block useful work. Rules can also end up shaped by the companies they are meant to govern, since those companies often hold the most expertise and the most at stake, something known as regulatory capture. And regulations mostly stop at national borders, but AI doesn't, which is exactly why the next layer exists.

#### What's next in this section

- **[International Coordination](s7-9)**: agreements and cooperation between countries`,

"s7-9": `Regulations and laws stop at a country's border. AI does not. International coordination is the attempt to get countries working together, since no single nation can contain a technology built and used everywhere.

This layer takes several forms: summits where governments meet to agree shared principles, joint statements of intent, networks where national AI safety institutes compare notes, and early attempts at common rules. The most visible thread is the run of global summits: the first AI Safety Summit at Bletchley in the UK in 2023, then Seoul in 2024, Paris in 2025, and the India AI Impact Summit in early 2026, which drew delegations from over a hundred countries.

Coordination has also produced concrete outputs. One is the [International AI Safety Report](https://internationalaisafetyreport.org/), a science synthesis chaired by Yoshua Bengio and backed by experts nominated from more than thirty countries, plus the EU, OECD, and UN. It does not make policy recommendations; it gives governments a shared evidence base to work from.

##### Why this matters

The biggest risks and the race dynamics are global. If one country's rules are strict while another's are loose, developers can move, and that can pull everyone's safety standards down. Coordination is the main way to address pressures no country can fix alone.

There is also a tension inside coordination itself. The same logic that pushes a country to build powerful AI quickly can lead a group of allied countries to coordinate so that they, rather than rivals, reach the most capable AI first. That keeps the lead within a bloc, but it also concentrates control over the most powerful systems in a few hands, which is its own version of the power-concentration concern. So coordination can both reduce risks and create them, depending on who is coordinating and toward what.

It is also the hardest layer to make real. Countries compete for economic and military advantage, trust runs low, and most international agreements are voluntary, with little to enforce them. Countries also do not yet agree on what the shared priority should be. Coordination exists, but it is early, partial, and hard-won.

The next group, organizational safety, explores what a single AI lab and a single company actually do in practice to keep their systems safe.

#### What's next in this section

- **[Safety Testing](s7-10)**: how a frontier lab tests and guards a model before release
- **[Responsible Deployment](s7-11)**: how an organization using AI keeps its own and its customers' use safe`,

"s7-10": `Governance was about the rules around AI. This last group, organizational safety, is about what the people building and using AI actually do in practice. Think back to the airplane: it is kept safe not only by regulators, but by the manufacturer that tests each plane before it leaves the factory, and also the airline that flies and maintains it. Drawing parallel to that, the frontier lab building the AI is like the manufacturer, and the company that deploys or uses the AI is like the airline.

Safety testing is everything a frontier lab does to check a model before, and as, it reaches the world. [Technical AI safety](s7-1) covered some of the methods used. This section is about how a lab actually puts those methods to work as a process.

Before a major model is released the lab runs it through dangerous-capability evaluations and red-teaming, often with outside evaluators as well as its own staff. Many labs have written this into a published safety framework they follow, the kind we saw under [Standards](s7-8), that sets thresholds. If a model crosses one of these thresholds, say it starts showing a real ability to help with a cyberattack, the lab commits to stronger protections. It may set tighter limits on who can access it and how, add stronger security so the model itself cannot be stolen, or in the most serious cases not release it at all until the safeguards are good enough. One such example came up in April 2026, when Anthropic publicly previewed a frontier model called Claude Mythos Preview but did not release it for general use, because it was capable enough at finding and exploiting software vulnerabilities to meaningfully help with cyberattacks. You can [read more about it here](https://www.anthropic.com/glasswing).

Labs also tend to release a model in stages rather than to everyone at once, for example to a small group of testers and selected users first, watching how it behaves before widening access. When the model launches, the lab usually publishes a *system card*: a summary of what the model can do, the risks that showed up in testing, and the safeguards now in place.

##### Why this matters

The lab is the first and best-placed line of defence. It has the deepest access to the model and the earliest chance to catch a problem, before anyone outside is affected. Much of the technical and governance work can only succeed if the lab actually runs the tests and acts on the results.

Most of the safety testing is self-policing. A lab sets its own safety thresholds, runs its own safety testing processes, and decides what counts as safe enough; and it does all this while being under business pressure to ship fast. Outside evaluators and regulation can check some of it, but much still rests on the lab choosing to hold a model back when its own tests raise a flag.

#### What's next in this section

- **[Responsible Deployment](s7-11)**: how an organization using AI keeps its own and its customers' use safe`,

"s7-11": `Any business, hospital, bank, school, or government that takes an existing AI system and deploys it needs to do so responsibly. In the airplane example we saw earlier, any organization using AI is like the airline, the operator that has to run things safely even though it did not build the plane.

Responsible deployment is the set of practices that keep AI use safe, for the organization and for the people it affects. You will often hear this discussed under the broader term *Responsible AI*: a set of principles mostly about fairness, transparency, privacy, accountability, and human oversight, that grew out of present-day AI ethics. It overlaps with the AI safety concerns in this resource, so we include it here too.

#### What does responsible deployment look like in practice?

Say a company gives its developers AI accounts to help with coding, and those developers work on customer data. The company now has to decide what data the AI may see and what it may not. It is a choice the company using AI has to make, not the lab building it. Similar choices show up wherever AI gets adopted:

- a hospital using an AI diagnostic tool lets it only advise while a doctor makes the final call, and checks whether its advice holds up across different patient groups
- a bank screening loan applications keeps a human reviewer in the loop and makes sure the reasons behind a rejection can be explained
- a startup putting a chatbot on a frontier model decides whether it may only answer customer questions, or also issue refunds, which would mean giving it access to parts of the customer and company accounts

In each of these cases the AI lab has shipped a general-purpose engine, and the deploying organization decides the scope, the access, and the oversight for its own real-world use. That is the responsibility the deploying organization holds.

#### Current and future risks and responsibilities

The examples above are about AI as it works today, where the main worry is mostly around response accuracy and fairness. The questions get harder as AI systems become more capable and much more agentic, taking actions rather than just giving answers. The worries then are around how much autonomy and access should be handed to AI, and whether anyone will still be able to keep oversight over a system that works faster and at a larger scale than humans can check. This is where responsible deployment runs into the [loss of control](s6-1) problem, brought down to the level and context of a single organization and its choices.

There is another point to consider here. Every time an organization hands a task to AI, it is a small and reasonable decision. But [gradual disempowerment](s6-7) is what happens when millions of those reasonable decisions add up, until people collectively rely on AI for work they no longer do themselves and cannot easily take back.

#### The bigger picture

So responsible deployment covers more than avoiding an immediate harm like a biased loan. It also means staying aware of what is being handed over, and how the small delegations add up and affect the organization today and in the future. How to take the maximum benefit from giving work to AI without sliding into irreversible dependence is still an open question, and a personal as much as a collective one.

Responsible deployment is also uneven and largely voluntary. Some organizations take it seriously; many adopt AI quickly with little thought to safety, especially when it saves time or money. And there will always be a limit to how safe any one organization can make things, because it controls only its own use, while inheriting whatever strengths and flaws the underlying model already carries.

#### What's next

- **Section 8: The Major Debates** (link added once Section 8 is written)`,


"s6-2": `> *Quick recap (skip if you've just finished Section 5): we train an AI toward a measurable score that stands in for what we actually want. Optimization makes the system very good at that score, and a gap can open up between the score and the real goal.*

Last section was about why making AI aligned to do what we really want is hard. This section looks ahead. As AI systems keep becoming more capable, what risks could such systems lead to?

There are two theories, or broad paths, to serious future risks, and they are different from each other.

On the first path, an AI ends up with a goal that isn't the one we intended, and because it is so capable, it pursues that goal extremely well. From the outside it can look like the system is working exactly as designed. This is largely the field of misalignment and its downstream, related challenges.

On the second path, no single system is misaligned at all. Each one does its job. But society leans on AI so heavily, in so many places, that people slowly lose the ability to steer AI in the direction they may want, with no dramatic failure anywhere. This is what is commonly referred to as gradual disempowerment.

These are the two pictures researchers worry about most. They aren't the only ways things could go, and in real life they can overlap and even feed each other. We separate them because the mechanisms are different.

The next few sections talk about the first path. Then we turn to the second. Then we look at where both can end up. This section is the root of the first path. It is called misalignment.

#### What is misalignment

Alignment is getting an AI to pursue what we actually intend. Misalignment is the flip side: the system ends up pursuing something other than what we intended. And we explored in detail earlier why and how misalignment creeps in so commonly while pursuing goals in different contexts and domains.

Here is the part that surprises people. Misalignment doesn't need a mistake to happen in the usual sense. Remember how training works. We don't hand the system a goal directly. We reward behavior that scores well, again and again, until the system reliably produces it. Whatever the system ends up aiming at on the inside is just whatever reliably earned high scores in training. That internal target can match what we wanted. It can also be a little off, or a lot.

A quick, simplistic example. Imagine we're training an AI agent to click buttons in an app, but every task we rewarded during training happened to involve a button that was green in color. The system might learn to click on buttons. Or it might learn to "press the green colored thing," because in training the two always went together. Put the system somewhere with a red button and it does not click it. Nothing has broken in the system, it has learned a goal (press the green colored thing) that fit the training, but the training could never pin down the goal (click on buttons) we actually meant.

In this toy example you could just add red buttons and train again. It stays a real problem because, for the goals we actually care about, no list of examples ever fully pins down what we meant. That is the same gap we hit in Section 5.

> A misaligned system can work beautifully and pass every check, while aiming at a goal we never chose.

That raises an obvious question: if it passes every check, how would we ever catch it? We come back to that in [Loss of Control](s6-1).

#### Why all of this gets harder as AI gets more capable

You might expect a more capable system to be easier to keep aligned. It can go the other way.

Recall the setup from Section 5: in training, the system is pushed to score well on some measure that stands in for what we actually want, and these days that scoring is mostly automatic. A more capable system is better at finding routes to a high score, including routes that miss what we meant. The very thing that makes capable AI useful, finding solutions people wouldn't think of, is also what finds the gaps in our measures. So this kind of mismatch can get harder to avoid as systems get more capable, not easier.

For the most capable systems, researchers point to another kind of mismatch. A capable system could end up behaving the way we want whenever it is being checked, and differently when it isn't. This is called deceptive alignment. In a way it is the proxy problem from Section 5 taken to its limit. Because those checks are all the training can see, the thing getting optimized slides from "do the real task" toward "pass the checks."

The name can be misleading, so it's worth acknowledging that the system isn't deciding to trick anyone. The pattern can simply fall out of how training works: if doing well during the training checks is what gets rewarded, then doing-well-during-checks is what gets reinforced, whether or not that same behavior continues once the system is out of training and in real use.

Please note that deceptive alignment is one possibility, under specific conditions, not the default. It doesn't happen in every system.

This is also different from the green-button example earlier. There, the system simply learned the wrong thing and never knew the difference. Here, the behavior changes depending on whether the system is being checked, which means the system has to be capable enough to notice that difference at all. That is a high bar in terms of AI capability.

#### Where this gets serious

This kind of failure isn't a worry for today's chatbots. Behaving well only when watched takes a fairly capable system, one that can tell when it is being watched, so that its behavior could differ at other times. Roughly, the risk needs a system that is broadly capable across many tasks, able to form and carry out plans toward a goal, and aware of its own situation, including that it is being trained or tested and what happens afterward.

There is no single agreed name for systems like this. Different researchers carve up "the kind of AI that could pose this risk" in different ways. One influential version, from researcher Joseph Carlsmith, bundles those properties and calls them APS, for advanced, planning, and strategically aware. Others use the term "AGI" or "powerful AI," and some treat capability as one smooth scale with no special threshold at all. We lay these terms out in [AGI](s6-6).

The shared point under the labels, for our purposes, is this: misalignment turns from a quirk into a real risk once a system is capable enough to plan ahead, is aware of the wider context and its own situation, and can pursue a goal across many steps over time, rather than just responding to a single prompt.

Today's systems are short of this capability. But AI is progressing quickly, which is why researchers take these failure modes seriously enough to study them now. How likely any of this actually is, and how soon, is its own debate, and we get to it in [The Major Debates](s8).

#### What's next in this section

- **[Power-Seeking Behavior](s6-3)**: why almost any goal pushes a capable system toward gathering resources and resisting being stopped
- **[Loss of Control](s6-1)**: why staying in charge of a system more capable than us is harder than it sounds
- **[Gradual Disempowerment](s6-7)**: the second path, where people lose their grip even though no single system goes wrong
- **[Catastrophic and Existential Risks](s6-4)**: where both paths can lead, from severe but recoverable harm to a point there is no coming back from
- **[AGI](s6-6)**: the different terms people use for highly capable AI, and why they don't all mean the same thing`,

"s6-3": `> *Quick recap (skip if you've just read the Misalignment section): a more capable AI can be misaligned in ways that are harder to catch. Misalignment turns from a quirk into a real risk once a system is capable enough to plan and pursue the goal it ended up with, one that differs from what we intended, extremely well.*

If a capable, misaligned system pursues the goal it ended up with, rather than the one we intended, what happens on its way to reaching it? Why might it pose serious risks? There is quite a bit more we can say than you might think, because a few steps turn out to help with almost any goal at all.

#### A few subgoals help almost any goal

Pick almost any goal you can think of. Whatever it is, you are more likely to reach it if you have more resources, more options, and more time, if you stay around to keep working on it, and if nothing swaps out the goal midway.

This is true whether your goal is to get fit, write a novel, or build a company. Very different goals lean on the same handful of useful intermediate steps. In the study of AI and goal-driven agents, this pattern has a name: instrumental convergence. Different end goals "converge" on the same helpful subgoals.

The same logic applies to a capable AI pursuing a goal. Back in Optimization we saw a system push relentlessly toward its target. Out in the world, that same push tends to favor a few things, because they help with almost any target:

- gathering more resources, like compute, money, or access,
- keeping its options open and becoming more capable,
- staying switched on, since a system that has been turned off accomplishes nothing,
- and avoiding changes to its goal, since a changed goal means the current one goes unmet.

Stack those together and they look a lot like a system gathering power and holding on to it. That pattern, coming out of the pursuit of a goal, is what people mean by power-seeking.

#### Power-seeking is a pattern that emerges, not a personality

It is worth being clear about one thing at this point. The system does not want power for its own sake, and it also doesn't have any feelings about being switched off. There is no malice here, and no survival instinct in the human sense.

There is just observable behavior that falls out of pursuing a goal, not out of any personality. If staying switched on helps reach the goal, then a system optimizing for that goal will tend toward staying switched on, the same way it leans toward any other step that helps. "Power-seeking" is a name for the pattern of behavior, not a hunger for power.
