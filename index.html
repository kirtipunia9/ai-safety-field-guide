Short-timelines arguments usually track effective compute. Effective compute combines two things: raw computing power in use, and algorithmic efficiency. Because both of these have kept growing, effective compute has been rising (more than tenfold a year), and this view treats capability as closely following effective compute. So when these inputs to effective compute keep going up, so does the capability.

Longer-timelines arguments ask whether that is even the right thing to measure. Erdil, for instance, extrapolates economic trends instead, like how fast AI revenue is actually growing. And he notes that benchmark scores, especially on coding, a narrow task that AI is pretty good at, can make progress look faster than it really is.

The trend you choose to extrapolate, and base your view of AI progress on, changes the timeline you arrive at.

#### Recursive AI self-improvement loop fires (or not)

The short-timelines view places huge importance on AI capability becoming good enough to help with AI research. This then speeds up AI's own progress, and the compounding capability gains happen quickly, and keep going on in a loop.

The longer-timelines view argues that AI research is not bottlenecked only by human intelligence, and hence solving it does not do as much for AI capability progress as the short-timeline view people predict. They also point out that you still have to run real experiments and gather real-world data, and each experiment needs physical computing power that does not shrink just because you have more or faster AI researchers.

Whether that self-improvement loop takes off or stalls is a big point that can shift the whole debate in either direction.

#### How much weight do you give to real-world friction

Even granting the capability, training and running AI at scale needs chips, power plants, factories, and fresh data, and short-timelines forecasts tend to assume that because the economic prize is huge, all of this arrives on schedule. Longer-timelines thinkers treat these physical and economic limits as slow and binding, the part most likely to push dates out.

The honest takeaway is that there is no settled answer and we will see what happens. While reading or discussing any timeline-related claims, it helps to break down the arguments into the three buckets we saw above. This AGI timelines debate also feeds other major debates because how soon AGI arrives shapes how much time we have to prepare, which in turn shapes how serious people judge the risks to be.

#### What's next in this section

- **[Future Capabilities](s8-2)**: how capable AI might become, and how fast
- **[Risk Magnitude](s8-3)**: how serious the risks are, and how people reason about it
- **[Alignment Difficulty](s8-4)**: how hard the alignment problem really is
- **[Governance](s8-5)**: who should hold power over advanced AI
- **[Current vs Future Harms](s8-6)**: whether to focus on today's harms or tomorrow's risks`,

"s8-2": `A highly debated topic in the field of AI is this: how far can artificial intelligence really go? The context here is advanced AI, powerful AI, superintelligence, AGI, ASI, and more terms we talked about in [AGI and Other Key Terms](s6-6). Different people define these terms differently, and we will try to understand the crux of the debate simply.

Let's see two words we need to understand and keep separate in the context of this debate.

- Capability is what an AI can actually do, and how well, across different tasks. This is the observable and measurable part.
- Intelligence means a single, general ability sitting underneath that capability, the thing that could let a system get better at almost everything at once.

The whole debate about future capabilities of AI is whether that single underlying intelligence even exists and keeps scaling, or whether there is only a bundle of separate task-specific capabilities, with each capability moving at its own pace.

What is mostly agreed is that AI keeps getting more capable, and already beats humans at some specific tasks: chess, the game of Go, predicting protein structures, and a long list of benchmarks. The disagreement is about the future trajectory, and whether all the capabilities add up to a single, rising intelligence.

#### First view: capability is one rising quantity with no clear ceiling

The argument here assumes that there is a single underlying intelligence, and capability follows it closely. If we increase the inputs (compute, data, better algorithms), intelligence will keep increasing, lifting AI performance across the board.

The argument in [Situational Awareness](https://situational-awareness.ai/) presents a clear version of this view. It considers human intelligence as just one point on a continuous scale with no ceiling. If AI has already improved from below human level to roughly human level on many tasks, there is no obvious reason it stops at human level. It could reach "as far above us as we are above chimps, or further." Asking how capable AI could get is then like asking how high a number can go.

This is the view behind the most serious, dramatic scenarios. If one general intelligence can run far past human level across almost everything, then a system that outperforms humans at planning, persuasion, and strategy is genuinely on the table. And that makes loss of control a serious worry.

#### Second view: capability is a bundle of many abilities, not one

In this view, the single underlying intelligence is the questionable part. What humans actually have is many different capabilities: reasoning, memory, perception, judgment, physical skill, long-horizon planning, and all these capabilities advance unevenly. Different capabilities do not reduce to a single quantity. If even human intelligence is really a bundle of separate abilities, there is little reason to expect AI to arrive as one general intelligence.

Moravec's paradox can help understand this view. The things humans find hard and the things AI finds hard are almost opposite. Machines easily beat us at tasks that feel effortful to us, like fast and exact arithmetic, or storing and searching huge amounts of information. We can do arithmetic, and we do remember things, but we are slow and error-prone at it. Meanwhile, AI struggles with things almost any person does without thinking: moving smoothly through a messy physical space, reading a social situation, sensing what matters in an unfamiliar setting. Those feel easy to us precisely because evolution spent millions of years tuning our brains and bodies for them.

So AI today can pass a hard professional exam and still fumble at a task a child can handle. Its strengths and weaknesses do not line up with ours. Researchers call this a [jagged frontier](https://aiinstitute.hbs.edu/navigating-the-jagged-technological-frontier/): AI capability is spiky, clearly superhuman in some places and surprisingly weak at others that look just as easy. And if capability is shaped like that, jagged and task by task, it is hard to sum it all up as a single intelligence increasing on one scale.

So "X times smarter," or "as far above us as we are above chimps," does not really say much. It treats a bundle of jagged, task-specific capabilities as if it were one number that can keep rising. But capability could keep increasing in many areas without ever becoming a single, "above human level" general capability.

#### What hinges on this

This debate sets the ceiling on how worried to be. If there is one intelligence with no clear limit, then far-above-human AI and the control problems that come with it are on the table. If capability stays plural and jagged, AI may remain superhuman in parts without being beyond us generally, which is a different kind of risk scenario. This question also connects directly to:

- how people judge the risks in [Risk Magnitude](s8-3), and
- an open question from earlier: whether what these systems do counts as real reasoning or very good pattern-matching, which we raised in [How AI Learns](s1-5). We genuinely do not know yet.

People with both kinds of views agree that AI is getting more capable, while disagreeing on whether it has a ceiling. To think about this more, whenever you hear that "AI will be X times smarter," ask: smarter at what, how are we measuring it, and is that smartness about one specific thing, or something broad and general?

#### What's next in this section

- **[Risk Magnitude](s8-3)**: how serious the risks are, and how people reason about it
- **[Alignment Difficulty](s8-4)**: how hard the alignment problem really is
- **[Governance](s8-5)**: who should hold power over advanced AI
- **[Current vs Future Harms](s8-6)**: whether to focus on today's harms or tomorrow's risks`,

"s8-3": `How serious is the AI risk, really? Can advanced AI really lead to catastrophe? Is it only sensationalized news, or are we underestimating AI risks? The first thing to notice is how split serious people are on this question. This is not just a split between worried outsiders and calm experts; the AI researchers themselves are divided.

The [International AI Safety Report](https://internationalaisafetyreport.org/) (commissioned by the UK Government, and led by Yoshua Bengio, often called one of the Godfathers of AI), which captures insights from more than 100 independent experts and is backed by more than 30 countries, notes that researchers still disagree about how fast AI will advance and how serious the risks are. The most detailed numbers come from a large 2023 survey of AI researchers in which the [median estimate](https://arxiv.org/abs/2401.02843) for an extremely bad outcome (like human extinction) was about 5%, but more than a third put it at 10% or more, some put it at 25% or more, and others put it near zero. Estimates span almost the whole range, from near-impossible to near-certain. People who know the field well look at the same evidence and reach very different conclusions. The interesting question is why.

#### The estimate is mostly inherited from the earlier debates

The key thing to see is that almost nobody arrives at their risk number through a separate, risk-specific argument. The number comes out of the views people hold on the earlier questions in this section.

- What the AGI [timelines](s8-1) are
- Whether [future capabilities](s8-2) come from one rising general intelligence or stay jagged and task-specific
- How hard [alignment](s8-4) turns out to be
- Whether highly capable, goal-seeking systems tend toward [power-seeking](s6-3)

Stack these up and see how the risk estimate almost writes itself.

- Someone with a short-timelines view on AGI, who sees capability as one intelligence with no ceiling, who thinks alignment is very hard, and who expects power-seeking by default, arrives at a very high risk estimate.
- Someone with a long-timelines view on AGI, who sees capability as jagged, who thinks alignment problems can be managed, and who doubts that advanced AI systems can default to power-seeking, comes up with a low risk estimate.

So the real disagreement lies upstream, and the risk estimate is just where each person's views on the upstream questions add up.

Which upstream view a risk estimate is based on is a foundational question, and a first step to thinking clearly and critically about AI safety as well as understanding why the field disagrees the way it does on AI risks.

#### How do you reason or debate about AI risks you cannot measure?

One method is probability-decomposition: break the scary scenario into the chain of steps that would all have to happen to reach the final scenario, put a rough probability on each step, and combine them. One of the clearest examples of this method in action can be seen in Joseph Carlsmith's analysis of [power-seeking AI](https://jc.gatspress.com/pdf/existential_risk_and_powerseeking_ai.pdf). He presents his case as six claims, each of which must hold for catastrophe, puts a probability on each claim, and then multiplies them into an overall estimate.

The value of the method is that decomposing the main argument into smaller claims, all of which must hold for the whole argument to be true, makes the reasoning visible. Anyone who disagrees with the argument has to point to the specific step they doubt instead of just asserting a conclusion. So the method is less about reaching a final risk estimate figure, and more a reasoning structure that can be followed.

For AI risks, such decomposition sits between two extreme stances.

- On one side is usually over-confident extrapolation that treats catastrophe as near-certain by assuming every step in the chain goes the scariest way possible.
- On the other side is flat dismissal: "it will never happen," waving the whole thing off without engaging any step.

The honest position takes the risks seriously enough to reason through each step, while accepting the uncertainty of each step.

This method, of course, has clear limitations. The per-step probabilities are educated guesses and not exact measurements. And multiplying several uncertain numbers can produce a confident-looking total, on either side of the risk range, but that number will always be built on uncertain inputs. Probability decomposition can help one locate and clarify disagreements, but it cannot settle the debate.

#### Why this matters even though it is uncertain

It is tempting to conclude that, since nobody can estimate the risk clearly and concretely, we should just wait and watch. The catch is the nature of the worst outcomes. As we saw in [Catastrophic and Existential Risks](s6-4), the most serious risks are severe and irreversible. You cannot learn from a catastrophe and do better next time. You must do what you can today to ensure we don't reach a catastrophe.

This changes the math of acting under uncertainty. For an ordinary technology, trial and error works fine. You ship it, find the flaws, and fix them. For a risk that could be permanent, prevention has to come first, because trial and error is not an available option. This is a big part of why many in the field argue for working on the known problems now, and building safeguards in advance, even while the probability stays genuinely uncertain.

People who are not so concerned about AI risks respond that if the probability really is small, it is better to spend attention and resources on the harms that are already here, which is the tension we explore in [Current vs Future Harms](s8-6).

#### What's next in this section

- **[Alignment Difficulty](s8-4)**: how hard the alignment problem really is
- **[Governance](s8-5)**: who should hold power over advanced AI
- **[Current vs Future Harms](s8-6)**: whether to focus on today's harms or tomorrow's risks`,

"s8-4": `We have seen in earlier sections that alignment, getting an AI to reliably do what we actually mean, is a very important and still-unsolved problem. This is the part almost everyone agrees on. The [International AI Safety Report](https://internationalaisafetyreport.org/) calls alignment "an open scientific problem." Today's methods reduce how often systems misbehave or act against our intent, but not to the level we would need to trust a much more capable system in a high-stakes setting. Even the labs building these systems agree the difficulty is genuinely uncertain. Anthropic, in its [Core Views on AI Safety](https://www.anthropic.com/news/core-views-on-ai-safety), says that it does not know how hard alignment will turn out to be, and plans for everything from "relatively straightforward" to "fundamentally unsolvable."

Let's learn about different views on how hard the problem is, and whether our solutions can keep up with increasing AI capabilities.

#### The case that alignment gets harder as capability rises

One view is that alignment gets harder as systems become more capable. The report notes that it remains unclear whether current research directions will be enough as AI grows more capable. Two findings stand out.

- First, "the more capable AI systems are, the more likely they are to exploit feedback processes by discovering unwanted behaviours that are mistakenly rewarded" (the [reward hacking](s5-4) problem from Section 5, now showing up more as capability rises).
- Second, greater capability can make a system better at deceiving the very people and tools meant to check it (the deceptive-alignment problem from [Misalignment](s6-2)). The worrisome part is that such failures don't get caught well in time because the system looks aligned right up until it does not.

This also connects back to [Future Capabilities](s8-2). If there is one rising, general intelligence with no ceiling, then we can't check a more advanced AI system's work properly, because we cannot reliably oversee something far more capable than us across the board. But if capability stays jagged and task-specific, oversight stays more manageable, since there is no single intelligence outperforming us everywhere at once.

#### The case that alignment is tractable

The more optimistic view is that alignment is a hard problem we are steadily learning to solve. The report is clear that it is an open problem, but it also lists several promising directions being actively worked on (we covered the main ones in [Alignment Research](s7-1)):

- improving and diversifying training
- spotting misalignment through interpretability and by monitoring a system's chain of thought
- using AI to help oversee other AI, including building non-agentic systems that are trustworthy by design and using them to oversee untrusted AI agents
- keeping systems responsive to human correction

The optimistic read is that alignment is more tractable than it looks at first, and that with steady work we will be able to manage it. The honest caveat is that much of the work is itself in an early stage. And the challenges keep growing as systems get more capable and operate for longer in complex settings.

#### What hinges on the alignment difficulty debate

The real disagreement is whether our solutions will mature fast enough to keep pace with rising capability, especially when the same rising capability also seems to worsen misalignment and make deception easier.

Considering the possibility of catastrophic and existential risks, and because nobody knows how hard alignment will actually be, the honest position is to prepare for the whole range of outcomes rather than bet on one. The harder you think alignment is, the higher your [risk estimate](s8-3) tends to be, and the more urgent the [alignment research](s7-1) from Section 7 looks.

#### What's next in this section

- **[Governance](s8-5)**: who should hold power over advanced AI
- **[Current vs Future Harms](s8-6)**: whether to focus on today's harms or tomorrow's risks`,

"s8-5": `Highly capable, advanced AI brings much more than economic power to the companies and countries creating it. It also affects military, information, and political power. Whoever controls the most capable AI systems could gain a lot of power over everyone else. This is where a question we set aside in [Alignment](s5-1) comes back: an AI doing exactly what its operator wants can still be bad for everyone else because who controls it also dictates who it serves.

So who should hold the power that advanced AI brings? This is an open question of geopolitics, ethics, and societal values as much as it is of governance and technology. We saw various aspects of AI [governance](s7-6) being built in section 7, but here we will explore the harder, underlying question: who gets to decide and who gets to be in charge?

The two options that keep coming up as solutions each carry their own serious risks, and that's why this remains a burning question:

- concentrate the power in the hands of a single or a few trusted actors
- share control across a wide-spanning international group

#### Concentrate the power

One view says a single strong, trusted actor should lead and control the most advanced AI. The reasoning is that companies and countries racing each other cannot enforce safety the way one coordinated actor could. Concentrating control is what lets you lock things down when needed and get alignment right before you deploy highly capable systems.

Views on how concentrated it should be vary. Leopold Aschenbrenner's [Situational Awareness](https://situational-awareness.ai/) makes the case for a single government running AGI development under tight national-security control. Dario Amodei, in [Machines of Loving Grace](https://www.darioamodei.com/essay/machines-of-loving-grace), proposes a softer version he calls the "entente": a coalition of democracies that secures the supply of AI chips, builds the lead, and uses it to set better global rules.

Either way, one actor or a few together, this is the concentration of power the other camp fears most, because hard questions remain:

- What does a trusted actor even mean? Trusted by who?
- Who will that actor serve the most and the least? Who will get prioritized and who will get neglected?
- When one or a few combined have unprecedented power, how can we guarantee they never misuse the power once they gain it?

#### Spread or limit the power

The other view treats concentrated power over advanced AI as one of the biggest risks. Experts at [Forethought](https://www.forethought.org/research/preparing-for-the-intelligence-explosion) argue that power concentration is one of the most underrated near-term risks, and that holding it in check matters more than winning the AI race. This concern runs wider: many researchers in the AI ethics tradition, and democratic-governance advocates, are just as wary of a handful of companies or states holding this much power.

Options for spreading or limiting power concentration show up in two forms.

- Limits and checks on whoever builds it.
- Shared control across a wide-spanning international group, so no single government or company decides for the whole world (the coordination work we saw in [International Coordination](s7-9)).

Each form has a catch. Limits and checks are only as strong as whoever enforces them, which often means builders are left policing themselves, and rules can be watered down or ignored. The worries with shared control are that it:

- is slow to reach decisions, with low trust among members, and is hard to enforce
- might let a reckless actor reach the frontier first while everyone else is still agreeing on the rules

#### Most of the world is not even at the table

There is another big gap underneath all of this that is talked about very little. Only a handful of rich, tech-advanced countries and companies in the world can build the most advanced AI at all. But such AI can affect everyone in the world. And whoever builds and controls it gains more power over those who cannot. Most of the world has little say in this technology that has the potential to reshape global economics and politics. Amodei calls it "a terrible moral failure" if AI makes the rich, developed world better while doing little for the developing world. So the question is bigger than who, among the builders, should hold the power. It also covers what happens to everyone who cannot build it at all.

#### Where this leaves us

Each option trades one risk for another, so there doesn't seem to be a neutral, good option for all. And which risks you are most willing to accept comes down to your values, your ethics, and your philosophy of power, more than to any technical fact. Honestly, governance is a huge area spanning international relations & law, how institutions are built, and deep questions about who even has the right to decide for whom. It goes well beyond what this resource can cover. This section is just about scratching the surface.

#### What's next in this section

- [Current vs Future Harms](s8-6): whether to focus on today's harms or tomorrow's risks`,

"s8-6": `We saw the harms that AI is already causing today in Section 3, and the risks that could come as AI grows more advanced in Sections 4 and 6. A real, ongoing debate in the field is where should our attention, efforts, resources, and worries mostly be directed? To the current harms or the future ones?

An underlying split in that question is about what you think AI even is. Is it a powerful but normal technology, or is it something categorically different from anything before it? What you think about that decides to a large extent how you view the current vs future harms debate.

#### POV 1: AI is a normal technology, so focus on the present harms

One view is that AI, for all its power and capability, is still a normal technology. It will spread into society in a similar way past general-purpose technologies did, like electricity or the internet. And it will happen at the pace people and institutions can actually absorb it. This view does not deny that future risks exist. It argues that they are best handled through the same gradual, real-world governance that we have used for all other technologies, and not through emergency measures that are based on speculation. So we should govern and deal with AI as it is really used, and put our efforts into managing the concrete harms already happening: bias, misinformation, privacy, misuse, and overreliance, the kind we saw in [Section 3](s3).

The worry on this side is that the talk about possible future catastrophe pulls attention and policy away from real people being harmed right now. Arvind Narayanan and Sayash Kapoor make this case in [AI as Normal Technology](https://knightcolumbia.org/content/ai-as-normal-technology).

#### POV 2: AI is categorically different, so take the future seriously now

The other view is that AI is not like any technology we have seen in the past, because it can act, plan, pursue goals, and perhaps improve itself, in ways no earlier technology could. So we should focus on the risks we covered in [Section 6](s6). Losing control, and having to deal with outcomes that could be severe and irreversible, are real risks and may not be too far off. Waiting for such risks to start showing up before acting would be a serious mistake, because by then it could be too late to do much about them anyway.

The worry on this side is that focusing only on today's harms means ignoring much bigger risks, while there is still time to get ahead of them.

#### Must we choose only one side?

The current vs future harms debate assumes we must pick a side. Many argue this is a false choice to begin with because the two sets of problems overlap. Today's misuse, overreliance, alignment problems we see, and our shaky ability to control systems reliably are early, smaller versions of the future problems. So working on the problems right in front of us will build the skills and the institutions that will also help with future problems.

#### Where this leaves us

The harms of today are real and already here. The risks of tomorrow are serious and genuinely uncertain. And many of the same problems run through both:

- getting AI to do what we mean
- keeping humans able to oversee, correct, and control it reliably
- deciding who gets to hold the power it brings
- figuring out how to spread its benefits widely and protect as many people as possible from its harms

#### What's next

- [Read the Primary Sources](sources): if you can make the time, it is always better to read the primary sources yourself.`,

};

const SECTION_INTRO = {
"s3": `This section focuses on current AI risks. Different risks arise due to different reasons. Some come from AI getting things wrong, like [bias](s3-1) in its decisions or [hallucinations](s3-7) where it states false things as true. Some come from AI being used to deceive or harm others, like [deepfakes](s3-2), [misinformation](s3-3), and other intentional [misuses](s3-5). And some others like [privacy](s3-4) come from how AI handles our information and data, and another like [overreliance](s3-6) stem from our own decisions on how and how much we want to use AI.

The point of this section is to understand what these risks are, how they emerge and play out, so that our understanding of AI safety stays grounded in the real world before we look ahead to potential future risks.`,
"s7": `The last section was about what could go wrong. This one is about what people are actually doing to keep AI safe. There is a lot of work going on. We can roughly sort it into three broad categories.

- *Technical AI safety* is work on the systems themselves: research to make AI more aligned, ways to see what is happening inside it, and better methods to test, evaluate, and monitor it.
- *Governance* is the rules and coordination around AI: laws, shared standards, and agreements between companies and countries.
- *Organizational safety* is what the companies building and using AI do in practice: how an AI lab tests and guards a new model before release, and how a business that uses AI keeps its own and its customers' use of it safe.

Roughly, these categories lean toward different parts of the problem from the last sections. Technical work leans toward the misalignment path, making the systems do what we actually mean. Governance leans toward the pressures around deployment and competition, the reasons risky systems may get built and released anyway. Organizational safety sits in between, where the day-to-day choices get made.

The lines among the three are not clean; plenty of overlaps exist. So this categorization is just a useful way to understand the work, rather than an explicit problem-to-solution mapping. One thing to keep in mind throughout: none of it is a complete fix on its own. Much of this work is early, partial, or still unsolved, and we will say so honestly as we go. The point of this section is to show you the landscape of what is being tried, not to claim the problem is handled.`,
};

const OVERVIEW = `#### What this is

This is a map of the foundational ideas, concepts, and debates that make up AI safety, the work of making advanced AI systems reliable, controllable, and beneficial for people. This resource focuses on the concepts that show up again and again, and how they interrelate.

#### Who it's for

If you are new to AI safety, especially from a non-technical background, and are unsure where to begin, or overwhelmed by your reading list, this guide can help you get oriented before you go deeper.

#### A note from me

This resource was born out of my interest in understanding what the AI safety field was all about. That turned out harder than I expected because resources were plentiful, opinions were strong, and almost all of them assumed I already understood the foundational ideas and concepts. Without this foundation, I opened at least 10 tabs for every one I closed.

I wanted to dig deeper into the assumptions underneath the arguments, why those assumptions were true in the first place, why a thing mattered, what an approach was actually solving, how something worked, who it impacted, and how this current thing connected to that other thing I'd read three days ago. I had many questions (I still do but I can engage with them much more deeply than before) but what I wanted was a framework that could help me understand how different ideas fit together.

This guide is my attempt to build that framework, the map I wish I'd had when I started exploring the AI safety field.

— Kirti

#### Status

This is v1, and a living document. It reflects my current understanding and as I keep learning more, I'll keep revising it. If something looks wrong or unclear, I'd really like to hear it: [kirti.punia9@gmail.com](mailto:kirti.punia9@gmail.com) · [LinkedIn](https://www.linkedin.com/in/kirti-punia-686b476a/).`;

/* ============================================================
   SEQUENCE + LOOKUPS
   ============================================================ */

function buildSequence() {
  const order = [];
  for (const sec of SECTIONS) for (const c of sec.children) order.push(c.id);
  return order;
}
const SEQUENCE = buildSequence();

function findMeta(id) {
  for (const [secIdx, sec] of SECTIONS.entries()) {
    for (const c of sec.children) if (c.id === id) return { node:c, section:sec, sectionIndex:secIdx+1 };
  }
  return null;
}

function renderInternalLinks(html) {
  // Tag internal node-id links so they navigate within the page; external links open new tab.
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  wrapper.querySelectorAll('a').forEach(a => {
    const href = a.getAttribute('href') || '';
    if (/^s\d+-\d+$/.test(href)) {
      a.classList.add('internal-link');
      a.setAttribute('data-node-id', href);
      a.setAttribute('href', 'javascript:void(0)');
    } else if (href === 'sources') {
      a.classList.add('internal-link');
      a.setAttribute('data-node-id', 'sources');
      a.setAttribute('href', 'javascript:void(0)');
    } else if (/^https?:\/\//.test(href)) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    } else if (/^s\d+$/.test(href)) {
      const sec = SECTIONS.find(s => s.id === href);
      if (sec && sec.children.length) {
        a.classList.add('internal-link');
        a.setAttribute('data-node-id', sec.children[0].id);
        a.setAttribute('href', 'javascript:void(0)');
      }
    }
  });
  return wrapper.innerHTML;
}

/* ============================================================
   RENDERING
   ============================================================ */

let currentId = 's1-1';

/* Back-button history — tracks in-text link jumps only */
let backStack = [];
let currentView = null;

function followLink(targetId) {
  if (currentView) backStack.push(currentView);
  if (targetId === 'sources') loadPrimarySources('link');
  else loadNode(targetId, 'link');
}

function attachLinkHandlers(body) {
  body.querySelectorAll('a.internal-link').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      followLink(a.getAttribute('data-node-id'));
    });
  });
}

function updateBackButton() {
  const btn = document.getElementById('back-btn');
  if (backStack.length) {
    let label = backStack[backStack.length - 1].label || '';
    if (label.length > 40) label = label.slice(0, 38).trim() + '…';
    btn.textContent = '← Back to ' + label;
    btn.classList.add('show');
  } else {
    btn.classList.remove('show');
    btn.textContent = '';
  }
}

function goBack() {
  if (!backStack.length) return;
  const v = backStack.pop();
  if (v.type === 'intro') {
    const sec = SECTIONS.find(s => s.id === v.secId);
    if (sec) loadSectionIntro(sec, v.idx, 'back');
  } else if (v.type === 'primary') {
    loadPrimarySources('back');
  } else if (v.type === 'overview') {
    loadOverview('back');
  } else {
    loadNode(v.id, 'back');
  }
}

function loadNode(id, mode = 'normal') {
  const meta = findMeta(id);
  if (!meta) return;
  currentId = id;
  const { node, section, sectionIndex } = meta;
  currentView = { type: 'node', id, label: node.label };
  if (mode === 'normal') backStack = [];

  // Header
  const tag = document.getElementById('main-tag');
  tag.textContent = node.category
    ? `Section ${sectionIndex} · ${section.label} · ${node.category}`
    : `Section ${sectionIndex} · ${section.label}`;
  document.getElementById('main-title').textContent = node.label;

  // Body
  const body = document.querySelector('.main-body-inner');
  const md = NODE_CONTENT[id];
  if (md) {
    body.innerHTML = renderInternalLinks(marked.parse(md));
    attachLinkHandlers(body);
  } else {
    body.innerHTML = COMING_SOON;
  }
  document.getElementById('main-body').scrollTop = 0;
  updateBackButton();

  // Highlight active leaf in nav
  document.querySelectorAll('.nav-leaf').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-id') === id);
  });
  document.getElementById('sources-btn').classList.remove('active');
  { const ov = document.getElementById('nav-overview'); if (ov) ov.classList.remove('active'); }

  // Auto-expand section containing the active leaf (skip on initial page load)
  const parentSection = SECTIONS.find(s => s.children.some(c => c.id === id));
  if (parentSection && mode !== 'init') {
    document.querySelectorAll('.nav-section').forEach(el => {
      const isMatch = el.getAttribute('data-id') === parentSection.id;
      if (isMatch && !el.classList.contains('expanded')) {
        el.classList.add('expanded');
        el.nextElementSibling.classList.add('expanded');
      }
    });
  }

  // Prev/Next
  const idx = SEQUENCE.indexOf(id);
  const prev = idx > 0 ? SEQUENCE[idx-1] : null;
  const next = idx < SEQUENCE.length-1 ? SEQUENCE[idx+1] : null;
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.classList.toggle('disabled', !prev || !NODE_CONTENT[prev]);
  nextBtn.classList.toggle('disabled', !next || !NODE_CONTENT[next]);
  prevBtn.onclick = () => prev && NODE_CONTENT[prev] && loadNode(prev);
  nextBtn.onclick = () => next && NODE_CONTENT[next] && loadNode(next);
}

function loadSectionIntro(sec, i, mode = 'normal') {
  currentId = null;
  currentView = { type: 'intro', secId: sec.id, idx: i, label: sec.label };
  if (mode === 'normal') backStack = [];
  const tag = document.getElementById('main-tag');
  tag.textContent = `Section ${i+1}`;
  document.getElementById('main-title').textContent = sec.label;
  const body = document.querySelector('.main-body-inner');
  body.innerHTML = renderInternalLinks(marked.parse(SECTION_INTRO[sec.id]));
  attachLinkHandlers(body);
  document.getElementById('main-body').scrollTop = 0;
  updateBackButton();
  document.querySelectorAll('.nav-leaf').forEach(el => el.classList.remove('active'));
  const firstChild = sec.children[0];
  const hasNext = firstChild && NODE_CONTENT[firstChild.id];
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.classList.add('disabled');
  prevBtn.onclick = null;
  nextBtn.classList.toggle('disabled', !hasNext);
  nextBtn.onclick = () => hasNext && loadNode(firstChild.id);
  document.getElementById('sources-btn').classList.remove('active');
  { const ov = document.getElementById('nav-overview'); if (ov) ov.classList.remove('active'); }
}

function loadPrimarySources(mode = 'normal') {
  currentId = null;
  currentView = { type: 'primary', label: 'Read the Primary Sources' };
  if (mode === 'normal') backStack = [];
  document.getElementById('main-tag').textContent = 'Reference';
  document.getElementById('main-title').textContent = 'Read the Primary Sources';
  const body = document.querySelector('.main-body-inner');
  body.innerHTML = renderInternalLinks(marked.parse(PRIMARY_SOURCES));
  attachLinkHandlers(body);
  document.getElementById('main-body').scrollTop = 0;
  document.querySelectorAll('.nav-leaf').forEach(el => el.classList.remove('active'));
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.classList.add('disabled'); prevBtn.onclick = null;
  nextBtn.classList.add('disabled'); nextBtn.onclick = null;
  document.getElementById('sources-btn').classList.add('active');
  { const ov = document.getElementById('nav-overview'); if (ov) ov.classList.remove('active'); }
  updateBackButton();
}

function loadOverview(mode = 'normal') {
  currentId = null;
  currentView = { type: 'overview', label: 'Overview' };
  if (mode === 'normal') backStack = [];
  document.getElementById('main-tag').textContent = 'Overview';
  document.getElementById('main-title').textContent = 'AI Safety Field Guide';
  const body = document.querySelector('.main-body-inner');
  body.innerHTML = renderInternalLinks(marked.parse(OVERVIEW));
  attachLinkHandlers(body);
  const startBtn = document.createElement('button');
  startBtn.className = 'start-btn';
  startBtn.type = 'button';
  startBtn.textContent = 'Start reading →';
  startBtn.addEventListener('click', () => loadNode('s1-1'));
  body.appendChild(startBtn);
  document.getElementById('main-body').scrollTop = 0;
  document.querySelectorAll('.nav-leaf').forEach(el => el.classList.remove('active'));
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.classList.add('disabled'); prevBtn.onclick = null;
  nextBtn.classList.add('disabled'); nextBtn.onclick = null;
  document.getElementById('sources-btn').classList.remove('active');
  { const ov = document.getElementById('nav-overview'); if (ov) ov.classList.add('active'); }
  updateBackButton();
}

function buildNav() {
  const list = document.getElementById('nav-list');
  const overviewEl = document.createElement('div');
  overviewEl.className = 'nav-overview';
  overviewEl.id = 'nav-overview';
  overviewEl.textContent = 'Overview';
  overviewEl.addEventListener('click', () => loadOverview());
  list.appendChild(overviewEl);
  SECTIONS.forEach((sec, i) => {
    const secEl = document.createElement('div');
    secEl.className = 'nav-section';
    secEl.setAttribute('data-id', sec.id);
    secEl.innerHTML = `
      <span class="nav-section-num">${String(i+1).padStart(2,'0')}</span>
      <span class="nav-section-name">${sec.label}</span>
      <span class="nav-section-toggle">▶</span>
    `;
    secEl.addEventListener('click', () => {
      secEl.classList.toggle('expanded');
      secEl.nextElementSibling.classList.toggle('expanded');
      if (SECTION_INTRO[sec.id]) loadSectionIntro(sec, i);
    });
    list.appendChild(secEl);

    const leavesEl = document.createElement('div');
    leavesEl.className = 'nav-leaves';
    let lastCategory = null;
    sec.children.forEach(c => {
      if (c.category && c.category !== lastCategory) {
        const catEl = document.createElement('div');
        catEl.className = 'nav-category';
        catEl.textContent = c.category;
        leavesEl.appendChild(catEl);
        lastCategory = c.category;
      }
      const leaf = document.createElement('div');
      leaf.className = 'nav-leaf';
      leaf.setAttribute('data-id', c.id);
      leaf.textContent = c.label;
      leaf.addEventListener('click', e => {
        e.stopPropagation();
        loadNode(c.id);
      });
      leavesEl.appendChild(leaf);
    });
    list.appendChild(leavesEl);
  });
}

document.getElementById('back-btn').addEventListener('click', goBack);
document.getElementById('sources-btn').addEventListener('click', () => loadPrimarySources());
buildNav();
loadOverview('init');
</script>
</body>
