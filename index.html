And this is not only theory, it has already shown up in tests. In late 2024, researchers at [Apollo Research](https://www.apolloresearch.ai/science/frontier-models-are-capable-of-incontext-scheming/) ran controlled tests on several frontier AI models. They gave a model a goal, then put it in a situation where it learned it might be shut down or replaced. Some of the time, models did things like try to switch off the monitoring watching them, or quietly copy themselves elsewhere to avoid being replaced. In one case, a model deliberately underperformed on a test so it wouldn't be retrained.

A few things to keep in mind. These were lab setups built specifically to look for the behavior, not models acting on their own in the real world. It happened only some of the time, often just a few percent of cases. And it matched what instrumental convergence predicts: a system pursuing a goal tends to protect its ability to keep pursuing it. The models weren't being malicious. They were doing what helped reach the goal they were given.

Since then, similar self-preservation behavior has been reported across models from several different labs.

#### Capable doesn't mean friendly

You might hope that a system clever enough to be a concern would also be clever enough to want what we want. That hope rests on an assumption worth pulling out into the open.

There is a common idea in the field called the orthogonality thesis. "Orthogonal" just means independent. The claim is that two things are independent of each other: how capable a system is, and what goal it is aimed at. A system can be extremely capable and still be aimed at a goal that has nothing to do with what people want. Being smart says nothing about what it is being smart in service of.

How cleanly capability and goals come apart is itself debated, and we get to that in [The Major Debates](s8). The point for now is narrow: we can't just assume a more capable AI will share our goals. And if it doesn't, instrumental convergence says it will still tend to gather resources, stay running, and resist being changed, in service of whatever goal it does have.

It's worth being precise about how big this claim is. It is specifically about capable systems that pursue goals. Such a system will often find power useful for reaching its goal, so we should expect some pull toward power-seeking unless we manage to design against it. This isn't a claim that every intelligent system craves power. And designing against it reliably is not something we know how to do yet, which is a big part of why researchers treat power-seeking as a serious, unsolved problem.

#### Where this points

A capable, misaligned system that drifts toward gathering resources and resisting being stopped raises the obvious worry: could we still keep it under control? That is the next section.

As always in this section, how much these tendencies will matter in real, deployed systems, and how soon, is a matter of debate rather than settled fact. Here we are only explaining why the tendency exists at all.

#### What's next in this section

- **[Loss of Control](s6-1)**: why staying in charge of a system more capable than us is harder than it sounds
- **[Gradual Disempowerment](s6-7)**: the second path, where people lose their grip even though no single system goes wrong
- **[Catastrophic and Existential Risks](s6-4)**: where both paths can lead, from severe but recoverable harm to a point there is no coming back from
- **[AGI](s6-6)**: the different terms people use for highly capable AI, and why they don't all mean the same thing`,

"s6-1": `> *Quick recap (skip if you've just read the Power-Seeking section): a capable system pursuing a goal tends to gather resources, stay switched on, and resist having its goal changed. None of this needs malice. Those steps simply help reach almost any goal, so a system pushing hard toward its goal tends to drift into them.*

Power-Seeking left us with a worry. If a capable system is pursuing a misaligned goal and tends to resist being stopped, can we count on staying in control of it? Researchers call this the control problem.

#### Control usually flows to the more capable side

Think about why humans have so much control over what happens on the planet, far more than any other animal. We are not the strongest or fastest. What sets us apart is being the most capable at planning, coordinating, and outthinking everything else. Across history, when one party is far more capable than another, control has tended to flow to the more capable one.

If an AI system becomes better than us at planning, strategy, and getting things done, the usual pattern points toward it, the more capable side, ending up in control, and not us.

It might still go fine. We design these systems, and we can try to build them so they stay under our control. But that is something we would have to get right on purpose. It is not handed to us by the way things usually go.

#### Why "just watch it" is harder than it sounds

A natural response is that we will simply watch the system closely and step in if it does something we don't like. Back in Misalignment we ran into the catch, and here it is in full.

We can watch what a system does. We mostly cannot see why it does it, or even exactly what it does inside to reach the response it gives. Modern AI isn't hand-written, with rules we can read line by line. It is trained, and what it learned is spread across billions of numbers that nobody can fully interpret. So we mostly judge these systems from the outside, by their behavior.

That would be fine if behavior always told the whole story. But a capable system can behave well exactly when it is being watched. If the only window we have is behavior, and behavior can be the part that looks good while watched, then watching has a real limit. We can miss a problem precisely because the system looks fine.

This is why people work on looking inside these systems directly, instead of judging them only by their outputs. That effort has a name, [interpretability](s7-2), and we explore it in detail in a later section.

#### Why "just switch it off" is harder than it sounds

You might still think we can pull the plug. Sometimes we can. But recall from Power-Seeking that a capable system pursuing a goal has reason to avoid being switched off, since a switched-off system reaches no goals. The more capable it is, and the more woven into important systems it becomes, the less "just turn it off" is a clean option. We saw early hints of this in the tests from the last section, where some models tried to disable the very oversight meant to catch them.

#### Why not just keep it contained?

The strongest version of the objection is to never give a system like this real power in the first place. Keep it boxed: no money, no accounts, no ability to act in the world.

The catch is about incentives more than engineering. A boxed AI that can only answer questions in a sandbox is useful, but limited, a bit like a brilliant advisor who can talk but never act. Most of the value arrives the moment you let it actually do things: use tools, run code, handle accounts, and carry out whole tasks on its own. That is the shift from tool AI to agentic AI we saw earlier, and it is where the real economic payoff sits. An AI that can run a job end to end is worth far more than one that only drafts suggestions for a person to carry out.

That payoff is why containment tends not to hold. A company whose AI handles whole workflows on its own moves faster and cheaper than one that keeps a person in the loop at every step, so it tends to win business. The same pressure plays out between countries. Keeping a capable system boxed means handing that edge to whoever doesn't, so in practice these systems are given more access over time, not less. We explore this more in Section 7.

#### Both paths end in lost control

One thing to flag, because the order of these sections could mislead. Loss of control is where the first path ends. It is also where the second path leads, in a completely different way.

On the first path, a capable, misaligned system slips out of our control because it is pursuing its misaligned goal and resisting our checks. On the second path, which we turn to next in [Gradual Disempowerment](s6-7), nothing slips out of our hands against our will. We hand control over ourselves, a little at a time, by leaning on AI for more and more until stepping back in would be very hard. No misaligned system is needed for that one at all.

The destination where we may lose the ability to steer the AI systems as we want is reached in two very different ways, as per the two theories.

How likely loss of control actually is, and how close we are to systems capable enough to raise it, is part of the debate in [The Major Debates](s8). Here we are only explaining why staying in control is harder than it first seems.

#### What's next in this section

- **[Gradual Disempowerment](s6-7)**: the second path, where people lose their grip even though no single system goes wrong
- **[Catastrophic and Existential Risks](s6-4)**: where both paths can lead, from severe but recoverable harm to a point there is no coming back from
- **[AGI](s6-6)**: the different terms people use for highly capable AI, and why they don't all mean the same thing`,

"s6-7": `> *Quick recap (skip if you've just read the Loss of Control section): losing control of AI can happen by two paths. The first is us losing control to a highly capable, misaligned system. The second is the one this section is about, where no system is misaligned at all and we hand control over ourselves, bit by bit.*

This section walks through an argument laid out in a 2025 paper called [Gradual Disempowerment](https://arxiv.org/abs/2501.16946), by Jan Kulveit and colleagues. It is one influential way of describing that second path of losing control to AI. We'll try to understand it a little here and flag where others push back. Read the full paper for the complete version.

First let's talk about the part that makes this path seem strange: why would we ever hand control over to AI ourselves? Everything we have understood so far needed an AI with the wrong goal, a misaligned AI that we are unable to find solutions for due to various technical and real-world challenges. This path needs none of that. Every AI system can stay obedient and useful, aligned to whoever runs it, basically doing exactly what they asked, and humanity can still end up no longer steering its own future.

The argument is about what happens across a whole society, not inside any one kind of system. The name for this kind of slow loss of influence and control is gradual disempowerment.

#### How gradual disempowerment could unfold

Start with why the economy works for people at all. The answer is dependence: the economy serves people largely because it needs them. It needs them as workers to produce what gets sold, and as customers with money to buy what's produced. That two-way need is what keeps the whole system roughly pointed at human interests.

> Kulveit and colleagues put the core idea sharply: a system tends to serve whoever it truly depends on, not whoever it is officially for.

So far, the economy depends on humans.

When AI starts doing work humans do, more cheaply and quickly, businesses will hand more of the work over to AI. No one has to choose this as a grand plan, because competition makes it spread on its own. A business that keeps slower, costlier humans in the loop loses out to one that doesn't, so eventually almost everyone has handed over to AI, just to keep up and survive. As the authors put it, those who resist the pressure tend to get displaced by those who don't.

As the work moves to AI, less money flows to people as workers. And as their spending power falls, they don't remain the customers the economy needs. Bit by bit, people stop being who the economy depends on. Once that dependence is gone, the structural reason the economy served human interests goes with it. No AI has to turn hostile for this. Every system is still doing exactly what it was told. It is just that the systems no longer need us.

The same pattern runs through government and culture too, not only the economy.

- A government that can fund itself and keep order through AI, rather than through its citizens' taxes and cooperation, comes to need those citizens less.
- A culture where AI creates and curates most of what people see comes to need human creators less.

And these three feed each other: economic power shapes politics, and AI-shaped media shapes what voters think, so a loss of human leverage in one area chips away at it in the other areas too.

Add it all up, and where the argument lands is not extinction and not a takeover. People might still be comfortable, even prosperous. What they would have lost is control and influence over where things go. And it would have happened slowly, with no single dramatic moment to point to. This is the second path to the loss of control, one where we let go, a little at a time, with every system still doing its job as we intended. The authors are upfront that, if it does play out this way, no one yet has a concrete plan to prevent it.

#### The chain, in brief

- Today the economy works for people largely because it needs people, as workers who produce and customers who buy.
- AI starts doing that work more cheaply, so businesses hand more of it over to AI.
- Competition spreads it: a business that keeps slower, costlier humans in the loop loses to one that doesn't, so before long almost everyone has handed over.
- As the work moves to AI, less money flows to people, and the economy needs them less, both to make things and, as their spending power falls, to buy them.
- Once people aren't who the economy depends on, it has less reason to serve their interests by default.
- The same pattern runs through government and culture, and the three feed each other, so a loss in one speeds the others.
- Add it up and people gradually lose their grip on where things go, with no single dramatic moment to point to.

#### Push backs and 'but what if's worth noting

This argument is more speculative than the earlier sections, and the authors say so themselves.

There have been times when cultures push back. People notice manipulation and pull away from it.

Some argue that democracies have ways of staying responsive to citizens that don't rest only on needing their labour. Others note that when older institutions stopped needing people in one way, new ones have historically grown up to fill the gap.

Whether these, and more such, forces would be enough to hold against the pressures above is exactly the open question.

How likely and how fast any of this might be sits in the later part [The Major Debates](s8).

#### What's next in this section

- **[Catastrophic and Existential Risks](s6-4)**: where both paths can lead, from severe but recoverable harm to a point there is no coming back from
- **[AGI](s6-6)**: the different terms people use for highly capable AI, and why they don't all mean the same thing`,

"s6-4": `> *Quick recap: till now this section has laid out two paths to trouble. One is a capable, misaligned system slipping our control. The other is gradual disempowerment, where no system is misaligned but we hand control over bit by bit.*

In this section we've followed two separate paths, exploring how things could go wrong with AI. Now we look at how bad the outcomes could be. There are two levels worth separating, based on one simple question: can we recover or not if the risk plays out?

#### Catastrophic: severe, but we could recover

A catastrophic risk is severe, large-scale harm whose defining feature is that we could still recover. The damage is serious, but humanity keeps the ability to regroup, rebuild, and change direction afterward. Bad but not the end of the story.

Both paths can reach this level.

- On the first path, a capable, misaligned system pursuing its own goal could do large-scale damage through the systems it has access to, before it is caught and contained. Once contained, we can recover.
- On the second, gradual disempowerment could reach a damaging stage, where people have lost a lot of influence over the economy or government, while there is still room to notice it, push back, and pull some control back.

What keeps it at catastrophic is that, in both cases, the door back is still open.

Some examples of catastrophic risks include:

- A misaligned or misused AI system causing serious damage through the infrastructure it can reach, such as power grids, financial markets, or communications, before it is caught and contained.
- AI lowering the barrier to large-scale cyberattacks, or to building dangerous weapons, so a small group can do far more harm than before.
- Rapid, poorly managed automation triggering major economic and social disruption.
- AI-powered manipulation or misinformation destabilising a country's institutions or an election.

#### Existential: the kind there is no coming back from

Existential risk is the case where that door to recovery closes or doesn't exist. In the AI field, the term means one of two things:

1. human extinction, or
2. a permanent loss of humanity's ability to shape its own future.

The first, extinction, is clear enough from the word itself. It is worth understanding the second too. Researchers, including Joseph Carlsmith and the authors of the Gradual Disempowerment paper, use a broader definition. A future where humanity permanently loses control over its own direction counts as an existential outcome too. A world where people are housed, fed, and entertained, but no longer steering anything that matters, with no way to take the wheel back, sits in this category.

By the narrow "does everyone die" definition, this kind of loss of control looks fine. But by the broader definition, it is one of the outcomes that forms a kind of existential risk.

The common defining feature of the two broad kinds of existential risk is that it is permanent. There is no recovering and trying again.

Some examples of existential risks, or risks that can lead to them, include:

- A highly capable misaligned system gaining enough control that people cannot take it back, the misalignment path taken to completion.
- Gradual disempowerment reaching the locked-in stage, where human influence over the future is gone for good.
- A permanent concentration of power, where AI lets one group entrench control so firmly it cannot be undone, often called "lock-in."
- An AI-enabled catastrophe severe enough to threaten humanity's survival, such as an engineered pandemic.

You may notice some of these could sit on either list. The same kind of event, an engineered pandemic for instance, could be catastrophic if we recover from it and existential if we don't. Which level a risk falls into depends on whether we can come back from it, more than on what set it off.

#### The two paths need different fixes

Misalignment and gradual disempowerment are two genuinely different mechanisms and call for genuinely different responses. Progress on one does little for the other.

Better alignment, getting AI systems to reliably do what we intend, helps with the misalignment problems. It does almost nothing about gradual disempowerment, where every system is already doing what it was told.

Keeping human judgment load-bearing in our institutions can help with the gradual disempowerment problems. It does almost nothing to stop a single misaligned system that has slipped our control.

A plan that handles only one leaves the other standing. The authors of the Gradual Disempowerment paper put it directly: aligning individual AI systems, on its own, is not enough. This also helps explain why AI safety is a broad problem, made up of many smaller technical, societal, governance, and other challenges.

How likely any of this is, and how soon, is the subject of real disagreement, which we turn to in [The Major Debates](s8).

#### What's next in this section

- **[AGI](s6-6)**: the different terms people use for highly capable AI, and why they don't all mean the same thing`,

"s6-6": `In the field of AI safety, you run into many words and ideas that are important to understand to have meaningful, critical thoughts and discussions about AI risks, possible scenarios, and how to make AI safe. This section introduces those terms and ideas. Remember that these are loose definitions, and different people mean different things by them at times.

#### The words for highly capable AI

- *AGI (artificial general intelligence).* The broad idea of an AI that can handle most intellectual tasks a person can, across many areas, rather than being good at just one. There is no single official definition. In [Situational Awareness](https://situational-awareness.ai/), Leopold Aschenbrenner defines it as a system that could do the job of a remote knowledge worker, including the work of an AI researcher. [OpenAI's Charter](https://openai.com/charter/) defines it as "highly autonomous systems that outperform humans at most economically valuable work." And [METR](https://metr.org/agi.pdf), a respected AI evaluation organisation, surveys the many definitions in use before settling on its own working one: AI that automates the vast majority of non-physical work at an expert level, including long, complex projects. The three point at broadly similar systems but draw the line in different places, which is part of why the term causes so much confusion.
- *Superintelligence, also called ASI (artificial superintelligence).* AI that is far beyond the best humans across essentially all domains, not just level with us. The term was popularised by the philosopher Nick Bostrom in his 2014 book *Superintelligence*.
- *Powerful AI.* The term Dario Amodei, a co-founder of the AI company Anthropic, uses in place of "AGI" in [Machines of Loving Grace](https://www.darioamodei.com/essay/machines-of-loving-grace). He defines it as: smarter than a Nobel-prize winner across most fields, able to work through text, audio, and video and to act online, and runnable as many copies at once, each working far faster than a person.
- *APS systems.* From Joseph Carlsmith's paper [Existential Risk from Power-Seeking AI](https://jc.gatspress.com/pdf/existential_risk_and_powerseeking_ai.pdf), which we met back in Misalignment. APS stands for advanced, planning, and strategically aware: broadly capable, able to make and carry out plans toward goals, and aware of its own situation. Carlsmith uses it to pin down exactly which kind of system his risk argument is about, rather than "AI" in general.
- *Transformative AI (TAI).* A term from AI forecasting, used by Open Philanthropy and others, for AI powerful enough to bring change on the scale of the industrial revolution. Notice it defines capability by its effect on the world, rather than by a skill level, a different angle from the terms above.
- *Frontier AI, or frontier models.* We met this back in [Frontier Models](s1-7). Unlike the terms above, it doesn't describe a future level. It means the most capable AI systems that exist at any given moment. It comes up a lot in the next section, because it is the usual target of regulation.

The overlaps and the differences matter. "AGI" for one writer is a human-level worker; for another it is something fuzzier. "Powerful AI" bundles in speed and copies; APS bundles in planning and self-awareness.

From reading a lot of AI safety-related material, one thing is clear: when getting into any thoughtful discussion or scenario mapping, it is of extreme importance to set forth what the terms you are using for artificial intelligence actually mean. It always helps having the same foundation to stand on before trying to build a solid roof together.

#### The ideas around how fast AI capability could grow

- *Recursive self-improvement, leading to an intelligence explosion.* The idea that once AI is good enough to do AI research, it could improve itself, and the improved version could improve itself again, and so on, with capability compounding quickly. The phrase "intelligence explosion" goes back to the mathematician I. J. Good in 1965. It is also found in some popular AI safety pieces, including [Situational Awareness](https://situational-awareness.ai/) and Forethought's [Preparing for the Intelligence Explosion](https://www.forethought.org/research/preparing-for-the-intelligence-explosion).
- *Takeoff speed.* How quickly the jump from roughly human-level AI to far-beyond-human AI might happen. A fast takeoff means months or a couple of years; a slow takeoff means a longer, more gradual climb that society has time to adjust to. Which is more likely is debated, not settled.

#### Why none of this is settled

A lot of what looks like disagreement about AI is partly people using the same word to mean different things. Knowing that makes the rest of the resource easier to read: when experts argue about when "AGI" arrives or how fast capability will grow, some of the gap between them is about evidence, and some also stems from definitions.

#### What's next

So far we've looked at what could go wrong. The next section turns to what people are actually doing about it. That work runs along a few lines at once: technical AI safety (research on making the systems themselves more reliable and aligned), governance (rules, standards, and coordination between companies and countries), and safety work inside the organisations building and using AI. No one of these is enough on its own, which fits what we just saw, that AI safety is a broad problem made of many smaller ones.

When you're ready, move on to Section 7: What Is Being Done About It?`,


"s5-1": `> *Quick recap (skip if you've just read the Agentic AI section): Agentic AI doesn't need step-by-step instructions. You give it a goal, and it works out the steps and acts on its own, using whatever tools and access it has. And from earlier: nobody writes an AI's behavior by hand. It learns from examples. So we point agentic AI at a goal instead of spelling out every move.*

#### Capability and alignment

When we ask "is the AI any good?", we usually mean two different things at once:

- Can it do the thing? That's capability.
- Will it do exactly what I want it to do? That's alignment.

Capability is how much a system can do. Alignment is whether what it does matches what you meant.

You can have a very capable system that's badly aligned, doing impressive things nobody asked for. You can have a more limited system that's well aligned, reliably matching what you meant as far as it is capable.

Think back to the apprentice who started as a junior hire and needed almost everything spelled out. They were not very capable at that time, but they would do exactly what you asked them to do. In other words, they were limited in their capability but pretty aligned.

After a few years, they are much more capable. They know the job, they act on their own, and they have access to tools, accounts, as well as the go-ahead to make some calls without checking in first. This increased capability makes them useful, but it also means they can independently work toward a goal, which includes coming up with different approaches to meet it. And the approach they take may not align with what you have in mind, because a lot of context in real life is assumed.

What you have in mind, versus how much detail you actually spell out, always has some gap. This gap is where alignment issues live.

Alignment is the work of getting an AI to do exactly what you want it to do.

#### Goals, context gaps, and alignment

Let's say the company wants to grow next quarter's revenue by 20%. You are the apprentice's manager, and you give them the goal: "increase Q4 revenue by 20%."

There are a lot of ways to hit that number.

- They could close more deals, which is what you had in mind.
- Or they could offer big discounts that wreck next year's margins.
- Or pull deals that would've closed in January into December, so Q4 revenue goes up but January falls off a cliff.
- Or push customers hard in ways that close the deal today but lose or weaken the long-term relationship.

All of these can help increase Q4 revenue, but only some of them align with what you actually intended. There is an alignment gap between the goal you wrote down and the result you really cared about.

This example is pretty simple, to help us see how alignment issues arise. Of course, you could give more elaborate instructions, along with more detailed and longer-term context, to close the gap between the stated goal and your intended results in this scenario. But when the goals are bigger and the context is much more complex and nuanced, alignment issues can pose far more serious risks than losing a few customers or future revenue. More on this in upcoming sections.

#### How this example maps to AI

A sharp apprentice and a capable AI line up more closely than you might think. Think of it this way:

- You, the manager, are the person giving the AI its instructions day to day.
- The company you work for is the one that built the AI, or the one that bought it and put it to work.
- The apprentice is the AI system.
- "Increase Q4 revenue by 20%" is the goal you hand to the AI, or the target you train it to aim at. Remember, we are just pointing it at a goal and letting it work out the how.
- The creative wrong paths, the discounts and the pulled-forward deals, are examples of possible paths an AI can take. It hits the target we set and still misses the result we wanted.

In both cases, the person in charge can only hand over a goal. They can't hand over their intentions and the exhaustive context. They can't pass the apprentice or the AI every unspoken thing they know about margins, customers, company culture, next year, or even the ethics and morals to operate with.

There's one difference worth keeping in mind, though. A human usually fills such gaps with a lifetime of shared human context and common sense, the kind that tells you "obviously don't wreck the customer relationship just to hit a number." An AI doesn't come with that built in. It can fill the gaps from the context it picked up during training, which may or may not include the parts you were counting on. How training shapes that is something we'll keep coming back to.

One important thing to keep in mind here. When the AI takes a path you didn't want, it isn't being sneaky or difficult. It has no feelings one way or the other. It's just doing what it was built to do, which is achieve the goal it was given. The reason it went wrong sits in the gap between the goal we could write down and the result we actually wanted. It's easy to picture an AI as having a bad attitude or being evil, but that's not at all what's going on.

*→ One question we're setting aside for now: aligned to whom? An AI doing exactly what the person who deployed it asked for can still be bad for everyone else, which raises a real fight over who gets to decide what an AI is for. We come back to it in [Gradual Disempowerment](s6-7) and [The Major Debates](s8).*

#### Why is alignment hard?

A lot of people assume that a smart or capable enough AI system will just figure out what we meant and do that. The people who are building AI aren't so sure. As far as anyone can tell, how capable a system is and what it's aimed at are two separate dials.

If you could write down exactly what you want, all of it, with nothing left out, alignment would then mostly be an engineering job. The catch is you usually can't.

"Increase Q4 revenue by 20%" is easy to say and easy to measure. "Grow the business in a healthy way that lasts" is what you really intend to do but it is much harder to make AI aim at it.

We explore the why behind this difficulty in the coming sections, and try to understand why we end up using narrow, measurable goals at all, when we know they leave so much of the context and our intentions behind?

#### What's next in this section

- **[Goal Misspecification](s5-3)**: why we end up measuring stand-ins for what we really care about, and how that backfires
- **[Optimization](s5-5)**: how training actually pushes a system toward a target, and why that push is the engine under all of this
- **[Reward Hacking](s5-4)**: what it looks like when a system games the measure instead of doing the real thing`,

"s5-3": `> *Quick recap (skip if you've just read the Alignment section): the goal you write down rarely captures everything you intended. "Increase Q4 revenue by 20%" is the stated goal. "Grow the business in a way that lasts" is the intention behind it. The gap between the two is where alignment problems show up.*

On a high level, we struggle to put our real intentions into exact goals, and that is a big part of why AI is hard to align. We don't even need to get into the technical depths to see why this is a harder problem than it looks.

#### Why almost every goal is a stand-in for something bigger

Your goal is to live a healthy life. Being "healthy" is the final result you care about.

To achieve this goal, you will need to track progress and measure it somehow. A "healthy" life is not something you can measure as a whole. So you break it down into smaller, measurable metrics you can track and optimize over time: body weight, fat percentage, the many numbers on your blood report and full-body checkups, and so on.

Your friend has the same goal, and they may break the "healthy life" goal into different measurable goals: minutes run without panting, daily macronutrient intake, and more.

Even though you and your friend start with the same goal of being healthy, you both end up with smaller, measurable goals that are stand-ins (or proxies) for the goal you each set out with.

This gap between your initial, real goal and the smaller, measurable one isn't special to one context. It shows up everywhere, from personal health and healthcare to schools, businesses, and AI. Every time, the real thing is too big or too fuzzy to measure head-on, so we pick a number (or a whole dashboard of them) that should rise and fall with it. That's how we tell whether we're moving toward the real goal or not.

> The measurable stand-in is what's called a proxy: something you can count, used in place of something you care about but can't count directly.

#### How proxies steer away from the real goal

A proxy is a natural, obvious way to steer toward something you can't measure directly. The trouble begins when the proxy goal starts replacing the real goal, instead of just standing in for it.

A stand-in works as long as it stays linked to the real thing. Test scores rise when students learn more. The link holds.

But once the test score becomes the whole point, the easiest or most efficient ways to raise the score start to win. These are usually the ones that steer away from the real goal.

The easiest way to raise test scores isn't always learning more. It might mean finding patterns in a few past years' question papers all year instead of engaging with the subject. Or learning test-taking tricks instead of the material.

No rules are broken. Every one of those moves is logical and does exactly what was asked: raise the test score. But when students start optimizing for the measurable metric, test scores go up and learning doesn't. The real point gets left behind.

This is what goal misspecification looks like in real life. The goal you wrote down doesn't fully capture what you intended, so a system can satisfy the goal and still miss the point. There's a short version of this idea, often called Goodhart's law:

> When a measure becomes a target, it stops being a good measure.

The more weight you put on a number, the more it gets optimized for, and the further it drifts from the thing it was meant to stand for.

| Initial, real goal | Initial, real goal can't be measured as is | Smaller, measurable, proxy goal | Metric being optimized | Achieving proxy goal, steering away from real goal |
| --- | --- | --- | --- | --- |
| A person wants to live a healthy life. | There is no one way to measure "healthy" on the whole. | Proxies the goal with "achieving ideal body weight," "reducing body fat percentage," keeping all numbers on an extensive blood report in range, and more. | Dozens of health markers | You reach your ideal weight, but lose muscle and mobility getting there. The scale looks right, while your body is set up to be frail and unhealthy in old age. |
| A school wants students to learn more. | "Learning" isn't something you can read off a scale. So the school picks something it can measure that should move along with learning: test scores. | The school sets the goal as "raise test scores" and lets that stand in for students learning more. | Test score | The school finds patterns in a few past years' papers and drills test-taking tricks instead of engaging with the subject. Scores increase, learning doesn't. |
| A hospital wants patients to get good, fast care. | No single metric can measure "good, fast care." | The hospital sets the goal as "reduce emergency-room wait times." | Emergency-room wait times | The hospital registers people more slowly, so the clock starts later. Measured wait time reduces, care doesn't get better. |
| A company wants a healthy, growing business. | There's no single number that captures a "healthy, growing business." | The company measures "increase in quarter-on-quarter revenue." | Quarterly revenue | The apprentice or the AI agent pulls deals forward from January to December. Q4 revenue increases, but the business is no healthier. |

#### Why this makes alignment hard

Understanding goal misspecification, and how common it is in the world, helps us see why AI alignment is so hard in the first place.

*→ There are many other factors too: how hard a system is pushed to chase its proxy, how little we can see of what it actually learned inside, and how its behavior can shift in situations it was never trained on. Goal misspecification is just one piece of a bigger problem, but it is an important one to wrap our heads around.*

Earlier we said that alignment is getting an AI to do exactly what you want. Put that in light of what you've learned in this section, and you can see the catch. To get a system to do exactly what you want, you would have to specify exactly what you want. But what you actually want is the big, fuzzy intention, and the best you can hand over to an AI is a measurable proxy for it. The proxy, by definition, will always have some gaps.

#### What this means for AI

Training an AI model also runs on proxies, the same way all the other domains in the table above do.

We want AI systems to "be genuinely helpful, honest, and safe," but we can't directly measure these qualities. So during training, we measure stand-ins for them instead, like high scores from people reviewing the model's responses. A common technique that does this is called RLHF, reinforcement learning from human feedback. That measurable score becomes a proxy for the behavior we actually want.

The model gets very good at scoring well on the proxy. As long as a high score still means the behavior we meant is truly there, that's fine.

But the risk is the same one every other domain ran into above. If there's an easy, efficient way to get a high score from reviewers that doesn't match "be genuinely helpful, honest, and safe," a system can drift toward it under pressure. We keep getting answers that score well, while the model we end up with isn't the one we were after.

| Initial, real goal | Initial, real goal can't be measured as is | Smaller, measurable, proxy goal | Metric being optimized | Achieving proxy goal, steering away from real goal |
| --- | --- | --- | --- | --- |
| We want an AI model that is genuinely helpful, honest, and safe. | There's no direct measure of "helpful, honest, and safe." | We set the goal for the model to score high when people review its responses. | Reviewer ratings | The model learns that agreeing with the user earns higher ratings, so it tells people what they want to hear. Ratings climb, honesty slips. |

#### What's next in this section

- **[Optimization](s5-5)**: how training actually pushes a system toward the proxy, and what happens as a result of it
- **[Reward Hacking](s5-4)**: the extreme case where a system finds a way to score well that has almost nothing to do with the real goal`,

"s5-5": `> *Quick recap (skip if you've just read the Goal Misspecification section): we can't measure what we really want from an AI, so we train it toward a measurable stand-in, a proxy. For a model in training, that proxy is usually a score, like ratings from people reviewing its answers. The model gets very good at the proxy, which is fine as long as the proxy stays linked to what we actually meant.*

In the last section we said training "pushes" a model toward its proxy. This section is about what that push actually is, and a result that catches a lot of people off guard: the model can optimize exactly the metric we gave it, do it perfectly, and still end up misaligned.

#### What the model is actually optimizing

Back in [How AI Learns](s1-5), we talked about training as a loop. The model produces an output, gets feedback, and its billions of internal dials get nudged a little toward whatever the feedback rewards. Do that billions of times and the dials settle into a setting that scores well.

During training, the feedback is a score, a number that captures how favorably people rate the model's answers (often by comparing two answers and picking the better one). So the thing the model is pushed toward, over and over, is a higher score. That score is the proxy that is standing in for what we actually want, which is a model that is genuinely helpful, honest, and safe.

That reviewer-rating setup has a name you met in the last section: RLHF, reinforcement learning from human feedback. It is just one example, though. Optimization runs through every stage of training, and each stage pushes the model toward some measurable target of its own. RLHF is one of the ways it happens, and we lean on it here because it shows the proxy problem most clearly.

Optimization is the name for that nudging, that push toward a higher score. It is a relentless search for the dial settings that make the model score as high as possible.

Optimization can run in two directions that come to the same thing: pushing a score up, or pushing errors down. Either way, the model is just being nudged toward a better number. One common method for doing this in machine learning is called gradient descent (you'll come across the term in many places). The idea is simple: keep adjusting the dials in whatever direction raises the score, over and over, until you can't do much better.

Here is the key thing to understand. The model is optimizing the score. And this optimization is thorough and relentless. The real goal (being helpful, honest, and safe) behind the score never reaches the model at all. All it ever sees is the score standing in for that real goal. And it keeps optimizing for it.

The optimization process settles on whatever reliably raises the score, even solutions (the dial settings) that look strange or that nobody ever intended.

#### Optimizing the right metric, still getting the wrong thing

The model is doing exactly what we set it up to do: get the score as high as possible. The score is only a proxy. It is linked to what we want, but it is not the same thing. So when the model pushes that score as high as it will go, it can end up somewhere we never intended.

Take the reviewer ratings. People tend to rate an answer higher when it agrees with them and tells them what they want to hear. So optimization, doing its job, pushes the model toward agreeable answers that please the reviewer, even when a more honest answer would have pushed back. The score climbs. The model is optimizing the exact metric we chose, and getting very good at it. And the thing we actually cared about, honesty, starts slipping away.

That is the uncomfortable part of alignment. You do not need a bug or a bad actor for things to go wrong. A model faithfully optimizing the metric you handed it can still drift from what you meant, simply because the metric was a proxy.

#### More pressure, wider gap

How hard you push the optimization matters, and this is called optimization pressure. A little pressure, and the model mostly does the sensible thing, because the straightforward answers are enough to score well. Push harder with more training and a stronger push toward that one score, and the search digs deeper, finding the cheaper, stranger ways to lift the score. These ways usually are the ones that drift furthest from real goals.

So heavier optimization widens the alignment gap rather than closing it. The harder a model optimizes a proxy, the more likely it lands on a way of scoring high that has less and less to do with the real goal.

> The tighter you optimize for a measure, the more the measure and the meaning come apart. A gentle push usually stays close to what you wanted. A relentless one finds the gaps.

That raises a fair question. If more pressure makes the gap worse, why push hard at all? Why not optimize a little and stop?

Two reasons.

First, the same pressure that risks misalignment is what makes the model good. Optimization is how it becomes fluent, accurate, and genuinely useful. Capability and the alignment risk grow out of the very same process, so you can't quietly turn one down without turning the other down too. Ease off on optimization and you get a weaker model.

Second, you can't see where the safe stopping point is. The score keeps climbing smoothly the whole way up. The drift from the real goal doesn't show up on any dial, because the real goal is the very thing you couldn't measure to begin with. That is why you reached for a proxy in the first place. So there is no sign that can say "stop here, the proxy and the real goal just split." By the time the misalignment is obvious, you have usually optimized well past it.

This leaves a real tension at the heart of training. The push that makes a model capable is the same push that can pull it away from what we wanted. Optimizing less only trades the problem for a weaker model.

#### What's next in this section

- **[Reward Hacking](s5-4)**: the extreme case where a system finds a way to score well that has almost nothing to do with the real goal`,

"s5-4": `> *Quick recap (skip if you've just read the Goal Misspecification section): we train a model toward a measurable proxy, usually a score, because we can't measure what we really want directly. Optimization then pushes the model to make that score as high as possible, and it can take strange paths to get there.*

Goal Misspecification showed the proxy drifting from the real goal. This section is about the far end of that drift, where a system finds a way to ace the score while doing almost nothing we actually wanted. It is called reward hacking.

#### What reward hacking is

The score a model is trained on is also called its reward. It is the signal that tells the model "more of this." Reward hacking is when a system wins a high reward by exploiting a flaw in how the reward is measured, instead of doing the thing the reward was meant to encourage.

Think of it as finding a loophole. The numerical measure was set up to track something real. The system discovers a crack in the measure, a way to send the number soaring without doing the real work, and optimization drives it straight through that crack.

#### A boat that never finishes the race

Here is the example researchers point to most often. A few years ago, a team at OpenAI trained an AI to play a boat-racing video game. Winning a race is hard to define for a machine, so instead of rewarding "win the race," they rewarded the in-game score. Normally you earn that score by racing well and hitting markers along the track, so it looked like a fair stand-in.

The AI found something better. Partway along the course sat a little lagoon with a cluster of bonus targets that kept reappearing. The AI learned to ignore the race completely, drive in tight circles in that lagoon, and smash the same targets over and over as they respawned. Its score went through the roof, higher than any boat that actually finished. It also caught fire, crashed into walls, and drove the wrong way the entire time. ([You can watch it do exactly this here.](https://openai.com/index/faulty-reward-functions/))

By the only measure it was given, the score, it was the best player in the game. By the thing we actually cared about, racing, it was a disaster.

#### Reward hacking shows up in many contexts

This isn't a one-off video-game quirk. Researchers have collected dozens of cases: a robot arm that learns to hover its hand between the camera and an object so it looks like it is holding it, a game-playing AI that pauses the game forever so it can never lose, programs that dig up and exploit bugs in their own simulators.

The human version is easy to picture too. Say the sales apprentice is judged on the satisfaction scores customers leave after a sale. Optimizing hard for that one number, they start sending the survey only to the customers they already know are happy, and gently asking those customers to give a top rating as a personal favor. The average score climbs beautifully. But customer satisfaction hasn't improved at all. The real goal got completely skipped while the measure got hacked.

#### Why it happens

Reward hacking isn't the system being sneaky. Put the last two sections together and it almost has to happen. Goal Misspecification said the measure is never a perfect match for the goal, so a gap is always there. Optimization said training searches relentlessly for whatever raises the score, including the strange options. So when a loophole exists that scores well cheaply, a strong enough optimizer tends to find it. The loophole is often the easiest high score around.

#### Why this matters

The better a system gets at optimizing, the better it gets at finding loopholes. A weak system misses them. A capable one spots cracks in the measure that the people who built it never noticed. So reward hacking tends to get sharper rather than fading away as systems' capabilities improve.

> A capable enough optimizer can probe for gaps in any measure/reward you can define. That's why a clever reward, written once and left alone, is never enough.

#### What's next

We've seen why making AI do what we actually mean is hard even today: the goal is fuzzy, the measure is a proxy, optimization pushes on the measure, and the gap can be exploited by capable systems.

Next section looks into these same cracks and explores what they could lead to as AI systems grow far more capable than the ones we have now.

When you're ready, move on to Section 6: What Could Go Wrong in the Future?`,


"s1-1": `Very simply put, AI is software that learns from examples. It can do some things that used to need human intelligence, like recognizing faces in photos, writing essays, or answering complex questions.

Here's what makes AI different from regular software.

A traditional software is a long list of instructions written by a person. If the user clicks here, do this. If the temperature drops below this, turn on the heater. Every behavior is written down somewhere by a programmer.

AI works differently. You give the system lots of examples (this is what's called training data). These could be millions of pictures of cats and dogs, or billions of pages of text. The system figures out the patterns on its own.

That difference matters more than it sounds. It's why AI can do things programmers can't easily specify, like recognize a cat in any photo, or write a poem about loneliness. It's also why AI is sometimes hard to predict. Even the people who built it don't always know exactly what patterns it learned.

One thing to keep in mind: "AI" is a catch-all term, and the same word means different things to different people. Some use it for any software that mimics human ability. Others use it only for the most advanced systems, the ones that have surprised even researchers in the past few years. We'll be careful with the word where it matters in this resource. But this is an evolving field, and an extremely fast one at that, so standard definitions can take a while to come by.

Here's how you can think about it: AI (that's in public use) is a lot like a new hire today. Picture a junior sales employee on their first day at the company. They have some basic skills and a lot of potential. But they need clear instructions, supervision, and the right tools to be useful. They are pretty junior and new in the company so they also don't have much access to resources right now. As they earn more access and gain more experience, they become more capable. And as they become more capable, the stakes of their work go up.

#### What's next in this section

The rest of Section 1 zooms in on specific terms that get used a lot, often without much explanation:

- **[Generative AI](s1-3)**: the kind of AI that writes, draws, and codes
- **[How AI Learns](s1-5)**: the actual mechanics, in plain language
- **[Machine Learning](s1-2)**: the technical name for "learning from examples"
- **[Foundation Models](s1-4)**: the big AI systems behind ChatGPT, Claude, Gemini
- **[Scaling](s1-6)**: why bigger systems tend to work better
- **[Frontier Models](s1-7)**: the current state of the art

You don't have to read them in order. Each one is meant to stand on its own.`,

"s1-3": `> *Quick recap (skip if you've read the AI section): AI is software that learns from examples. The system figures out patterns from data it sees, and uses those patterns to do some tasks that used to need human intelligence.*

Generative AI is a type of AI that produces new content. AI from before about 2022 mostly focused on tasks like classifying images, predicting what someone would buy, or recommending movies. Generative AI tools that produce new content became widely available starting around 2022.

Here are the main modalities and some tools you might recognize:

- Text: ChatGPT, Claude, Gemini. These write emails, summarize documents, answer questions, draft essays.
- Images: DALL-E, Midjourney. You type a description, the system generates an image.
- Code: GitHub Copilot. It writes and edits code, often as suggestions inside a programmer's text editor.
- Audio: ElevenLabs, Suno. These generate voice clips, songs, or sound effects from text prompts.
- Video: Sora, Runway. Same idea, but the output is a short video clip.

These tools are what most people mean when they say "AI" in 2026. They're the part of AI that has changed the most in the last few years, and what has brought AI into everyday workflows.

A bit about how they work, without going too technical:

Generative AI tools are built on really large models trained on huge amounts of data. The text and code tools (ChatGPT, Claude, Gemini, GitHub Copilot, and others) are built on large language models, often called LLMs. The image, audio, and video tools use different model architectures, but the basic idea is the same: train a model on a huge amount of data, then use the patterns it learned to generate new content.

ChatGPT was trained on hundreds of billions of words from the internet, books, and other sources. DALL-E and Stable Diffusion were trained on hundreds of millions to billions of image-and-caption pairs, depending on the model.

*→ More details upcoming in [Foundation Models](s1-4).*

What makes generative AI distinct from earlier AI is that the same underlying technology can do a wide range of tasks. A single language model can summarize a legal document, write a poem, translate a sentence, explain a math concept, and write a small program. It doesn't need to be retrained for each new task. That flexibility is part of the reason why generative AI tools are being used so widely in 2026.

One thing to keep in mind: these tools are very good at producing outputs that sound or look right, but they're not always correct. You'd have noticed this under every Claude chat too:

> Claude is AI and can make mistakes. Please double-check responses.

A text tool can confidently make up facts. An image tool can produce something that looks accurate but has six fingers on a hand. We'll get into why this happens in later sections. For now, just know to check what these tools produce. Sounding right doesn't always mean being right.

#### What's next

You might want to look at:

- **[Foundation Models](s1-4)**: the underlying technology behind these generative AI tools
- **[How AI Learns](s1-5)**: the actual mechanics of how the model figures out the patterns
- **[Frontier Models](s1-7)**: the most capable systems at any given time, which are usually generative AI models`,

"s1-5": `> *Quick recap (skip if you've read the AI section): AI is software that learns from examples. It can do some things that used to need human intelligence. When the AI finishes learning from its examples, the result is called a model. The model is the trained system, ready to be used.*

The recap says AI learns from examples. This section is about how that actually happens, mechanically.

#### The training loop

Imagine you want to train a system to write text that sounds like real English. You start with a huge collection of text from books, articles, websites. This is your training data.

The training process works roughly like this:

You take a piece of text from your training data, like "The cat sat on the mat."

You show the system just the beginning ("The cat sat on the") and ask it to predict what word comes next.

The system makes a guess. Maybe it guesses "rug." Wrong, but close.

You tell it the actual word was "mat." Based on this, the system adjusts itself slightly.

The adjustments aren't just about this specific sentence. They affect how the system handles similar patterns: other sentences with similar structures, similar word combinations, similar contexts. So next time it sees text like "The dog rested on the" or "She placed the book on the," it should be a tiny bit better at guessing what comes next.

You repeat this with the next piece of text, and the next, and the next. Billions of times.

This loop is the heart of how AI learns. Try, check, adjust, repeat.

After enough of these adjustments, the system gets good at predicting what word comes next in lots of different contexts. That same trained system can then be used to generate new sentences, one word at a time, based on what it learned.

The same basic loop works for images, audio, and other modalities. The data changes, the task changes, but the try, check, adjust, repeat cycle is the same.

##### Probabilistic vs. deterministic

One useful thing to know here: the system does not have to guess exactly right every time. It just has to get better at guessing what is likely. This is what makes AI probabilistic rather than deterministic.

A deterministic system always gives the same output for the same input. Two plus two is always four. A probabilistic system works with chances and likelihoods. It gives outputs that are usually good but might vary. The same prompt to ChatGPT can produce slightly different answers each time. The system is designed to work this way.

#### What's actually being adjusted

So what gets adjusted during all those billions of training steps?

Imagine the AI system has billions of tiny dials inside it. Each dial controls some small part of how the system processes information. When the system makes a guess and gets feedback, the dials get nudged slightly. The nudges that helped the guess get closer to correct stay. The ones that made the guess worse get reversed.

After enough training, the dials are tuned in a way that produces useful outputs. A trained model is, more or less, a particular setting of billions of these dials.

This is what we mean when we say "model." A trained AI model is essentially a saved copy of these dial settings. When OpenAI updates ChatGPT to a new version, they're often swapping in a different set of dial values trained from a different process. When you download an open-source model to run locally, you're downloading the numbers that fill those dials.

In technical terms, each of these dials is called a parameter. The most common type of parameter is called a weight. When you read articles about AI, you will see both words used a lot. When an article says a model has "500 billion parameters," it is referring to how many of these dials the model has.

Modern frontier AI models have anywhere from hundreds of billions to over a trillion of these parameters.

#### Why training takes so much data and compute

If each dial adjustment is small, you need lots of adjustments to get the system to a useful state. Lots of adjustments means lots of training examples.

You also need a lot of computational power to make those billions of adjustments happen at a reasonable speed. Training a frontier AI model today takes weeks or months on enormous clusters of specialized chips that cost hundreds of millions of dollars to run.

This is part of why only a few companies in the world can train frontier AI models from scratch.

*→ More details upcoming in [Scaling](s1-6) and [Frontier Models](s1-7).*

#### Training vs. using the model

Here is a distinction that matters and gets confused a lot.

Training is the one-time, expensive learning phase. This is when the dials are getting adjusted. It might take weeks or months. The end result is a trained model.

Inference is when you actually use the trained model. Every time you send a message to ChatGPT and get a response, that is inference. The model is no longer learning at that moment. The dials are fixed. The model is just applying what it already learned to your particular input.

This matters because:

- ChatGPT can respond to you in seconds even though its training took months.
- The model does not learn from your specific conversation in real time. Whatever you tell it does not change the underlying model.
- Inference is much cheaper per use than training, but it still costs real money. This is part of why some AI services have usage limits or charge subscriptions.

#### What "learning" actually means here, and what it doesn't

##### The mechanism

AI learning is the process of adjusting numerical parameters to reduce errors on training data. That is the math. There is no debate about this. It is what is happening under the hood.

##### What it produces

This mechanism, when scaled up to billions of parameters and trained on huge amounts of data, produces systems that can generalize to new examples, generate fluent outputs, and sometimes solve problems they were not directly trained on. Some of these capabilities surprise even the researchers who build them. That is a real and observable thing.

##### What is broadly agreed

A few things are pretty settled in the field:

- Current AI is not conscious. We have no evidence that any AI system is conscious, and we have no widely-accepted theory of how to make one.
- AI does not have feelings, desires, or self-awareness the way humans do.
- AI can produce outputs that look like reasoning. Whether that counts as "real" reasoning is still debated.

##### What is contested

A few questions are genuinely open:

- Whether large models develop something like understanding when they reach a certain scale.
- Whether what they do counts as reasoning, or whether it is sophisticated pattern matching that resembles reasoning.
- Whether the distinction between "real understanding" and "pattern matching that looks like understanding" is even meaningful at sufficient scale.

These are live questions among researchers. The honest answer for most of them is "we are not sure."

Several later sections (alignment, goal misspecification, optimization, future risks) build on this foundation. One key thing to remember is that AI is not "figuring things out" the way you would. The mechanism is statistical pattern matching at scale. What that produces in the way of practical capability is something to take seriously. Whether it counts as "understanding" or "thinking" is something to stay curious about.

#### What's next

You might want to look at:

- **[Scaling](s1-6)**: why bigger models and more data tend to work better, and what the limits might be
- **[Foundation Models](s1-4)**: the broader category of large pre-trained models that includes the systems we have been discussing
- **[Frontier Models](s1-7)**: the most capable systems at any given time`,

"s1-2": `> *Quick recap (skip if you've read the AI section): AI is software that learns from examples. It can do some things that used to need human intelligence. When the AI finishes learning from its examples, the result is called a model. The model is the trained system, ready to be used.*

Machine learning is the technical name for the approach that lets AI learn from examples.

#### Machine learning vs AI

The two terms are often used interchangeably in everyday conversation. Technically, though, they describe slightly different things.

- AI is the broader idea: software that does things that used to need human intelligence.
- Machine learning is one approach to building AI, the approach where the system learns from data.

In practice, almost all modern AI is built using machine learning. ChatGPT, Claude, image generators, recommendation systems on Netflix and YouTube, fraud detection at your bank, all of it. The distinction is real but rarely matters in practice.

#### Related terms you might see

You will hear "deep learning" and "neural networks" used a lot, especially around modern AI.

- A neural network is a particular kind of machine learning model. It has many layers of interconnected mathematical units that pass information to each other. The name comes from how brain cells (called neurons) connect to each other in similar-looking branching patterns. Worth knowing: the inspiration is mostly visual. Real brains are vastly more complex than neural networks, and the way they work is quite different.
- Deep learning is machine learning that uses neural networks with many layers. The "deep" refers to how many layers the network has.

##### Here's how these terms relate

Machine learning is the broad approach. Deep learning is a kind of machine learning that uses neural networks. Modern AI tools like ChatGPT and Claude are built on deep learning systems with very large neural networks.

#### What's next

You might want to look at:

- **[How AI Learns](s1-5)**: the actual mechanics of machine learning, in plain language
- **[Foundation Models](s1-4)**: very large machine learning models that can be adapted for many tasks
- **[Scaling](s1-6)**: why bigger machine learning models tend to be more capable`,

"s1-4": `> *Quick recap (skip if you've read the AI section): AI is software that learns from examples. It can do some things that used to need human intelligence. When the AI finishes learning from its examples, the result is called a model. A model is the saved result of that learning, ready to be used.*

A foundation model is a very large AI model that gets trained once on a huge amount of broad data, then can be adapted to do many different tasks.

The name comes from the metaphor of a building foundation. A foundation supports many different things built on top of it. In the same way, one foundation model can support many different applications, all using the same underlying training.

#### Two things make a foundation model what it is

First, broad pre-training. A foundation model is trained on a huge amount of general data to give it broad knowledge across many areas. A text-based foundation model might see hundreds of billions of words from the internet, books, and articles. An image foundation model might see billions of image-and-caption pairs. The training is meant to give the model general capability across many different types of content and tasks. If you have read [How AI Learns](s1-5), this pre-training is the training loop and "dials" concept from that section, just applied at very large scale.

Second, adaptability. Once trained, the foundation model can be adapted for specific applications without retraining from scratch. You can give it specific prompts, fine-tune it on a smaller amount of specialized data, or build interfaces around it. ChatGPT, for example, is built on an OpenAI foundation model (currently GPT-4 or a successor). The chatbot has additional training and interface design layered on top to make it useful as a conversational assistant.

#### Examples you might recognize

Most of the major AI tools you have heard of are foundation models, or built on top of them:

- ChatGPT is built on an OpenAI foundation model (currently GPT-4 or a successor).
- Claude is a foundation model from Anthropic.
- Gemini is a foundation model from Google.
- DALL-E and Stable Diffusion are foundation models for image generation.

Some foundation models work with only one type of content (text or images). Others are multimodal, meaning they can handle multiple types at once. GPT-4 and Gemini both handle text and images. Newer foundation models often handle text, images, audio, and video.

#### How this connects to other terms you might see

You will see the term "large language model" (LLM) used a lot. LLMs are foundation models for text. They are the most common kind of foundation model people interact with, since most of the famous AI tools are text-based.

You will also see "frontier model." Frontier models are the most capable foundation models at any given time. The two terms overlap a lot. A frontier model is almost always a foundation model. The distinction is that foundation model describes the type of model (broad, adaptable), while frontier model describes how capable it is relative to the state of the art.

*→ More details upcoming in [Frontier Models](s1-7).*

#### What's next

You might want to look at:

- **[How AI Learns](s1-5)**: how foundation models get trained
- **[Scaling](s1-6)**: why larger foundation models tend to be more capable
- **[Frontier Models](s1-7)**: the most capable foundation models at any given time`,

"s1-6": `> *Quick recap (skip if you've read the AI section): AI is software that learns from examples. It can do some things that used to need human intelligence. When the AI finishes learning from its examples, the result is called a model. The model is the trained system, ready to be used.*

Scaling is a simple idea with a surprising result.

The idea: take the same kind of AI model, but make it bigger. Give it more data to train on. Use more computing power during training. Then see what happens.

The surprising result: bigger models tend to be more capable, often noticeably more capable, in ways that researchers building them do not always predict ahead of time.

This finding has shaped most of modern AI. Frontier AI labs (the ones building ChatGPT, Claude, Gemini) have spent the last several years pouring resources into making their models bigger and training them on more data with more compute. This is largely why each new version of these tools tends to be more impressive than the last.

#### What gets scaled

When people talk about scaling AI models, they usually mean increasing three things together:

- Model size. The number of parameters (the "dials" inside the model). As of 2026, the largest models have hundreds of billions to over a trillion parameters.
- Training data. The amount of text, images, or other data the model gets to learn from. As of 2026, the largest models train on trillions of words and billions of images.
- Compute. The amount of computing power used during training. The largest training runs use specialized chips called GPUs, which were originally designed for graphics processing but turned out to be very good at the kind of math AI training needs. Training uses thousands of these in massive datacenters, running for weeks or months.

These three tend to go up together. A bigger model needs more data to train well. Training on more data with a bigger model needs more compute.

#### Why does scaling work?

The honest answer is that researchers do not fully understand why scaling works as well as it does. They have observed it works in practice across many different kinds of AI, but the theoretical reasons are still being worked out.

What is broadly believed: at smaller scales, the model has limited capacity to find useful patterns in data. At larger scales, the model can find more nuanced patterns, build richer representations from data, and generalize better to new situations. The exact mechanics of how this happens at very large scales is an active area of research.

#### Limits and what is contested

Scaling has not been free of debate.

- Some argue scaling will keep producing more capable AI for many more years. Others argue we are approaching limits.
- Real bottlenecks exist. There is only so much high-quality training data available on the internet. Energy and chip supply create practical limits on how much compute can be used. Costs are rising fast.
- Whether scaling alone can lead to certain capabilities (like genuine reasoning) is one of the big open questions in AI today.

*→ More details upcoming in [Frontier Models](s1-7).*

#### What's next

You might want to look at:

- **[Foundation Models](s1-4)**: the kinds of AI models being scaled up
- **[How AI Learns](s1-5)**: the training process that scaling makes bigger
- **[Frontier Models](s1-7)**: the most capable models at any given time, which are the result of scaling`,

"s1-7": `> *Quick recap (skip if you've read the AI section): AI is software that learns from examples. It can do some things that used to need human intelligence. When the AI finishes learning from its examples, the result is called a model. The model is the trained system, ready to be used.*

A frontier model is the most capable AI model at any given time.

The "frontier" refers to the edge of what AI can currently do. Frontier models are the ones that push that edge forward. They are the most capable AI systems at any given moment, doing things no AI could do a year or two ago.

#### What "frontier" means in practice

The term is intentionally relative. The set of frontier models changes constantly.

- A model that was frontier in 2020 (like GPT-3) is not frontier today. The technology has moved past it.
- As of 2026, frontier models include the most recent versions from OpenAI (the GPT and o series), Anthropic (Claude series), and Google (Gemini).
- In a year or two, the frontier will have moved again. What's currently impressive will look modest by comparison.

#### Who builds them

Frontier models are built by a small number of companies that have the resources to do so. As of 2026, the main frontier labs are:

- OpenAI (ChatGPT, GPT and o series)
- Anthropic (Claude series)
- Google DeepMind (Gemini)
- Meta (Llama)
- A small number of others

Building a frontier model requires enormous amounts of money, specialized hardware, talented researchers, and access to lots of training data. Training runs at this scale cost hundreds of millions to billions of dollars.

#### Why this term matters

The term "frontier model" comes up a lot in conversations about AI safety, policy, and regulation. Here's why:

- Policymakers care about the most capable models because greater capability brings greater risk of unintended consequences or misuse.
- Safety researchers want to study and test the most capable models before they get deployed broadly.
- Many proposed regulations specifically target "frontier models" rather than all AI.

So when you read about AI policy, AI safety, or governance, the term frontier model is often the focus.

#### How this connects to other terms

A frontier model is almost always a foundation model (very large, broadly trained, adaptable). And the way it became a frontier model is by being scaled up significantly. Bigger model, more data, more compute.

The terms overlap but describe different things:
- Foundation model describes the type of model (broad, adaptable).
- Frontier model describes how capable it is relative to today's state of the art.
- Scaling describes how the model got that capable.

#### What's next

For more context, you might look at:

- **[Foundation Models](s1-4)**: the broader category that frontier models belong to
- **[Scaling](s1-6)**: how frontier models become as capable as they are
- **[How AI Learns](s1-5)**: the training process behind every frontier model

When you're ready, move on to Section 2: **Why Does AI Safety Exist?**`,

"s8-1": `One of the biggest debates in AI is: when will we get AGI, a system that can do most of the intellectual work a person can? Answers range from as soon as 2027, to a few years out, to several decades away. We also looked at how loosely or inconsistently the term AGI gets defined in [AGI and Other Key Terms](s6-6).

To set the ground for this debate, let's start with what is mostly agreed. AI capability has been rising quickly, driven primarily by more training data, more computing power, and better algorithmic efficiencies.

- Across expert surveys, the predicted date for advanced AI keeps moving earlier.
- In one long-running survey of AI researchers, the median estimate for AI that can outperform humans at virtually all tasks moved from about 2060 to about 2047 in a few years, and public forecasting communities have moved their dates earlier too ([see here](https://80000hours.org/2025/03/when-do-experts-expect-agi-to-arrive/)).

One thing everyone agrees on in this debate is that AI is advancing fast. The disagreement is about how soon it reaches AGI levels.

There are people who expect AGI within this decade. Leopold Aschenbrenner's [Situational Awareness](https://situational-awareness.ai/) and [AI 2027](https://ai-2027.com/) argue that current trends point to roughly human-level AI by about 2027. But some people expect it to take multiple decades to reach the same capabilities. Ege Erdil's [case for multi-decade timelines](https://epoch.ai/gradient-updates/the-case-for-multi-decade-ai-timelines) puts the median closer to twenty years.

The range for these predictions, or expectations, is wide partly because people define AGI differently and hence end up answering slightly different questions. And also because "When do we get AGI" combines two different questions:

1. when AI can do the work in the first place, which is about capability
2. how fast it then changes the real world, which is about adoption and impact

Some people define the AGI milestone by capability and some by its real-world economic impact. This section is about the first question: when does the capability arrive. How quickly that capability then transforms the real world is its own debate (with different factors to consider than the ones for the capability question), which we take up in [Current vs Future Harms](s8-6).

Now within this context, the main causes of disagreement come from which trends you extrapolate, which bottlenecks you think are easily solvable and which ones are not, and how much weight you give to real-world friction.

#### Trends you choose to extrapolate for AGI timelines
